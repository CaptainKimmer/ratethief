<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Debt Rate Calculator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@800&family=Inter:wght@600;800&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#16a34a;
  --danger:#dc2626;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter;
  background:url("https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/oceanBackground.png") center/cover fixed no-repeat;
}

.wrap{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:rgba(255,255,255,.85);
  border-radius:18px;
  overflow:hidden;
  margin-top:20px;
}

.cardHeader{
  background:linear-gradient(135deg,#16a34a,#065f46);
  text-align:center;
  color:white;
  font-family:Cinzel;
  padding:20px;
  font-size:28px;
}

.calculatorShell{
  padding:20px;
  backdrop-filter:blur(10px);
}

/* HEADER ROW */
.debtHeaderRow{
  display:grid;
  grid-template-columns:150px 1fr 1fr 1fr;
  gap:10px;
  color:white;
  font-weight:800;
  margin-bottom:10px;
}

/* ROW */
.debtRow{
  display:grid;
  grid-template-columns:150px 1fr 1fr 1fr;
  gap:10px;
  margin-bottom:10px;
}

.calcField{
  padding:12px;
  border-radius:12px;
  border:none;
  font-weight:700;
}

/* TYPE SELECTOR */
.typeSelector{
  position:relative;
}

.typeIcon{
  width:100%;
  height:50px;
  object-fit:contain;
  display:none;
  cursor:pointer;
  background:white;
  border-radius:12px;
}

/* BUTTONS */
.addRowWrap{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:15px;
}

.addRowBtn,.removeRowBtn{
  width:60px;height:60px;
  border-radius:50%;
  border:none;
  font-size:30px;
  font-weight:900;
  color:white;
  cursor:pointer;
}

.addRowBtn{background:var(--accent);}
.removeRowBtn{background:var(--danger);}
</style>
</head>

<body>

<div class="wrap">

  <div class="card">
    <div class="cardHeader">Debt Rate = ?</div>
  </div>

  <div class="calculatorShell">

    <div class="debtHeaderRow">
      <div>Type</div>
      <div>Balance</div>
      <div>Payment</div>
      <div>Payment %</div>
    </div>

    <div id="debtRows">

      <!-- FIRST ROW -->
      <div class="debtRow">

        <div class="typeSelector">
          <select class="calcField debtType">
            <option value="">Select</option>
            <option value="mortgage">Mortgage</option>
            <option value="auto">Auto Loan</option>
            <option value="personal">Personal Loan</option>
            <option value="cc">Credit Card</option>
          </select>
          <img class="typeIcon">
        </div>

        <input class="calcField balance" placeholder="Balance">
        <input class="calcField payment" placeholder="Payment">
        <div class="calcField percentDisplay">?</div>

      </div>

    </div>

    <div class="addRowWrap">
      <button class="removeRowBtn" id="removeBtn">−</button>
      <button class="addRowBtn" id="addBtn">+</button>
    </div>

  </div>

</div>

<script>

const ICONS = {
  mortgage:"https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/CalculatorImages/mortgageIcon.png",
  auto:"https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/CalculatorImages/carIcon.png",
  personal:"https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/CalculatorImages/laonIcon.png",
  cc:"https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/CalculatorImages/creditCardIcon.png"
};

function calcRow(row){
  const bal = parseFloat(row.querySelector(".balance").value);
  const pay = parseFloat(row.querySelector(".payment").value);
  const out = row.querySelector(".percentDisplay");

  if(!bal || !pay){
    out.textContent="?"
    return;
  }

  out.textContent = ((pay/bal)*100).toFixed(2)+"%";
}

function attachRow(row){

  const bal = row.querySelector(".balance");
  const pay = row.querySelector(".payment");

  bal.addEventListener("input",()=>calcRow(row));
  pay.addEventListener("input",()=>calcRow(row));

  const select = row.querySelector(".debtType");
  const icon = row.querySelector(".typeIcon");

  select.addEventListener("change",()=>{
    const val = select.value;
    if(!val) return;

    icon.src = ICONS[val];
    icon.style.display="block";
    select.style.display="none";
  });

  icon.addEventListener("click",()=>{
    icon.style.display="none";
    select.style.display="block";
  });
}

function newRow(){
  const row = document.createElement("div");
  row.className="debtRow";

  row.innerHTML=`
    <div class="typeSelector">
      <select class="calcField debtType">
        <option value="">Select</option>
        <option value="mortgage">Mortgage</option>
        <option value="auto">Auto Loan</option>
        <option value="personal">Personal Loan</option>
        <option value="cc">Credit Card</option>
      </select>
      <img class="typeIcon">
    </div>

    <input class="calcField balance" placeholder="Balance">
    <input class="calcField payment" placeholder="Payment">
    <div class="calcField percentDisplay">?</div>
  `;

  attachRow(row);
  return row;
}

document.querySelectorAll(".debtRow").forEach(attachRow);

document.getElementById("addBtn").onclick=()=>{
  document.getElementById("debtRows").appendChild(newRow());
}

document.getElementById("removeBtn").onclick=()=>{
  const rows = document.querySelectorAll(".debtRow");
  if(rows.length>1) rows[rows.length-1].remove();
}

</script>

</body>
</html>
