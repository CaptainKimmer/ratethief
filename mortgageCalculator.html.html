<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Debt Rate Calculator</title>

  <link rel="icon" type="image/png" sizes="32x32"
        href="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/favicon_io/favicon-32x32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#ffffff;
      --card:#ffffff;
      --ink:#0f172a;
      --muted:#475569;
      --line:#e5e7eb;
      --accent:#16a34a;
      --accent2:#2563eb;
      --shadow:0 14px 40px rgba(2,6,23,.08);
      --radius:18px;
      --radius2:14px;
      --maxw:980px;
      --mobileHeaderH:0px;
      --mobileGap:6px;
      --danger:#dc2626;
      --dangerDark:#b91c1c;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100svh;
      font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--ink);
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:18px;
      background-image:url("https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/oceanBackground.png");
      background-size:cover;
      background-position:50% 10%;
      background-repeat:no-repeat;
      background-attachment:fixed;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(7,22,45,.18);
      pointer-events:none;
      z-index:0;
    }

    .wrap{
      width:min(var(--maxw),100%);
      display:grid;
      gap:10px;
      position:relative;
      z-index:1;
    }

    .topBar{
      display:grid;
      grid-template-columns:1.25fr auto 1.25fr;
      gap:18px;
      align-items:center;
      margin-top:2px;
    }

    .brand{
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .brand img{
      width:min(210px,58vw);
      height:auto;
      filter:drop-shadow(0 10px 22px rgba(2,6,23,.14));
    }

    .rateBlock{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      min-height:118px;
      background:rgba(255,255,255,.14);
      border:1px solid rgba(255,255,255,.18);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      border-radius:18px;
      padding:10px 12px;
      box-shadow:0 14px 40px rgba(2,6,23,.18);
    }

    .rateKicker{
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:center;
      color:#ffffff;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.14em;
      font-size:.78rem;
      margin-bottom:8px;
      text-shadow:0 2px 8px rgba(0,0,0,.35);
    }

    .rateNumber{
      font-size:clamp(3.2rem,6.2vw,4.9rem);
      font-weight:900;
      line-height:1;
      color:#ffffff;
      text-shadow:0 6px 18px rgba(0,0,0,.35);
    }

    .pct{
      font-size:.38em;
      position:relative;
      top:-0.30em;
    }

    .pulseDot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      animation:pulse 1.7s ease-out infinite;
    }

    @keyframes pulse{
      0%{box-shadow:0 0 0 0 rgba(22,163,74,.28)}
      60%{box-shadow:0 0 0 14px rgba(22,163,74,0)}
      100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}
    }

    .tagline{
      text-align:center;
      font-family:"Cinzel",serif;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.05em;
      font-size:clamp(1.05rem,2vw,1.45rem);
      margin:0;
      padding:0 8px 0;
      line-height:1.15;
      position:relative;
      display:block;
      width:100%;
      overflow:hidden;
    }

    .tagline > span{
      color:#f4c542;
      text-shadow:
        0 2px 6px rgba(0,0,0,.35),
        0 1px 0 rgba(255,255,255,.20);
      position:relative;
      display:inline-block;
    }

    .highlight-rates{
      color:#16a34a;
      -webkit-text-fill-color:#16a34a;
      text-shadow:
        0 2px 8px rgba(22,163,74,.28),
        0 2px 6px rgba(0,0,0,.25);
    }

    .highlight-steal{
      color:#065f46;
      -webkit-text-fill-color:#065f46;
      text-shadow:
        0 2px 8px rgba(6,95,70,.28),
        0 2px 6px rgba(0,0,0,.25);
    }

    .fullWidthBar{
      height:14px;
      width:100%;
      margin-top:2px;
      margin-bottom:0px;
      background:linear-gradient(to bottom,#0b1220 0%,#0b1220 60%,#111827 100%);
      border-radius:999px;
      box-shadow:
        0 10px 22px rgba(0,0,0,.30),
        inset 0 2px 2px rgba(255,255,255,.08),
        inset 0 -3px 6px rgba(0,0,0,.45);
    }

    .card{
      border:1px solid rgba(255,255,255,.22);
      border-radius:var(--radius);
      background:rgba(255,255,255,.88);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      box-shadow:0 14px 40px rgba(2,6,23,.18);
      overflow:hidden;
      margin-top:0px;
    }

    .cardHeader{
      padding:0;
      border-bottom:1px solid rgba(255,255,255,.18);
      text-align:center;
      background:linear-gradient(135deg,#16a34a,#065f46);
      position:relative;
      overflow:hidden;
    }

    .cardHeader::before{
      content:"";
      position:absolute;
      inset:-80%;
      background:conic-gradient(from 180deg, rgba(255,255,255,.0), rgba(255,255,255,.22), rgba(255,255,255,.0));
      animation:shine 4.2s linear infinite;
      pointer-events:none;
    }

    @keyframes shine{
      0%{ transform:rotate(0deg); }
      100%{ transform:rotate(360deg); }
    }

    .cardHeader h2{
      position:relative;
      margin:0;
      padding:18px 14px;
      font-family:"Cinzel",serif;
      font-size:2.05rem;
      letter-spacing:.08em;
      font-weight:900;
      text-transform:uppercase;
      line-height:1.05;
      color:#fff;
      text-shadow:0 10px 26px rgba(0,0,0,.28);
      animation:ctaGlow 2.6s ease-in-out infinite;
      white-space:nowrap;
    }

    @keyframes ctaGlow{
      0%{ text-shadow:0 10px 26px rgba(0,0,0,.28), 0 0 0 rgba(255,255,255,0); }
      50%{ text-shadow:0 10px 26px rgba(0,0,0,.28), 0 0 18px rgba(255,255,255,.55); }
      100%{ text-shadow:0 10px 26px rgba(0,0,0,.28), 0 0 0 rgba(255,255,255,0); }
    }

    /* CALCULATOR */
    .calculatorShell{
      margin-top:12px;
      border:1px solid rgba(255,255,255,.22);
      border-radius:var(--radius);
      background:rgba(255,255,255,.16);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      box-shadow:0 14px 40px rgba(2,6,23,.18);
      padding:18px;
    }

    .debtHeaderRow{
      display:grid;
      grid-template-columns:160px 1fr 1fr 1fr;
      gap:12px;
      align-items:center;
      margin-bottom:10px;
    }

    .debtHeaderCell{
      color:#ffffff;
      font-size:.95rem;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.04em;
      text-shadow:0 2px 8px rgba(0,0,0,.35);
      padding:0 4px;
    }

    .debtRows{
      display:grid;
      gap:12px;
    }

    .debtRow{
      display:grid;
      grid-template-columns:160px 1fr 1fr 1fr;
      gap:12px;
      align-items:center;
    }

    .calcField{
      width:100%;
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.88);
      color:#0f172a;
      border-radius:14px;
      padding:14px 14px;
      font-size:1rem;
      font-weight:700;
      outline:none;
      box-shadow:0 8px 22px rgba(2,6,23,.08);
      min-height:54px;
    }

    .calcField:focus{
      border-color:rgba(22,163,74,.65);
      box-shadow:0 0 0 4px rgba(22,163,74,.14);
    }

    .calcField::placeholder{
      color:#64748b;
      font-weight:600;
    }

    .percentDisplay{
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      user-select:none;
    }

    .addRowWrap{
      display:flex;
      justify-content:center;
      gap:16px;
      margin-top:16px;
    }

    .addRowBtn,
    .removeRowBtn{
      width:58px;
      height:58px;
      border:none;
      border-radius:999px;
      color:#fff;
      font-size:2rem;
      font-weight:900;
      cursor:pointer;
      transition:transform .14s ease, box-shadow .14s ease;
      line-height:1;
    }

    .addRowBtn{
      background:linear-gradient(135deg,#16a34a,#065f46);
      box-shadow:0 14px 28px rgba(6,95,70,.32);
    }

    .addRowBtn:hover{
      transform:translateY(-2px) scale(1.05);
      box-shadow:0 18px 34px rgba(6,95,70,.38);
    }

    .removeRowBtn{
      background:linear-gradient(135deg,var(--danger),var(--dangerDark));
      box-shadow:0 14px 28px rgba(185,28,28,.32);
    }

    .removeRowBtn:hover{
      transform:translateY(-2px) scale(1.05);
      box-shadow:0 18px 34px rgba(185,28,28,.38);
    }

    .addRowBtn:active,
    .removeRowBtn:active{
      transform:translateY(0) scale(.98);
    }

    @media (max-width:760px){
      body{
        padding:12px;
        background-position:58% 0%;
      }

      .mobileFixedHeader{
        position:fixed;
        top:0;
        left:0;
        right:0;
        z-index:50;
        background:rgba(7,22,45,.30);
        backdrop-filter:blur(8px);
        -webkit-backdrop-filter:blur(8px);
        padding:8px 12px 6px;
        box-shadow:0 8px 24px rgba(2,6,23,.14);
      }

      .mobileContent{
        margin-top:calc(var(--mobileHeaderH) + var(--mobileGap));
      }

      .topBar{
        margin-top:0;
        grid-template-columns:1fr auto 1fr;
        gap:8px;
      }

      .brand img{ width:104px; }
      .rateBlock{ min-height:unset; }

      .rateKicker{
        font-size:.56rem;
        margin-bottom:3px;
      }

      .rateNumber{ font-size:1.58rem; }

      .tagline{
        font-size:.82rem;
        margin:2px 0 2px;
        letter-spacing:.04em;
        white-space:nowrap;
      }

      .tagline > span{ white-space:nowrap; }

      .fullWidthBar{
        height:12px;
        margin-top:6px;
        margin-bottom:0px;
      }

      .cardHeader h2{
        font-size:1.25rem;
        letter-spacing:.07em;
        white-space:nowrap;
      }

      .debtHeaderRow{
        display:none;
      }

      .debtRow{
        grid-template-columns:1fr;
      }

      .addRowWrap{
        gap:12px;
      }

      .addRowBtn,
      .removeRowBtn{
        width:54px;
        height:54px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">

    <div class="mobileFixedHeader">
      <section class="topBar">
        <div class="rateBlock">
          <div class="rateKicker">
            <span>10Y Treasury</span>
            <span class="pulseDot"></span>
          </div>
          <div class="rateNumber"><span id="dgs10Mobile">--</span><span class="pct">%</span></div>
        </div>

        <div class="brand">
          <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/debtRateCaclulator.png"
               alt="Debt Rate mascot logo">
        </div>

        <div class="rateBlock">
          <div class="rateKicker">
            <span>30Y Mortgage</span>
            <span class="pulseDot"></span>
          </div>
          <div class="rateNumber"><span id="mort30Mobile">--</span><span class="pct">%</span></div>
        </div>
      </section>

      <div class="tagline">
        <span>
          Discover your
          <span class="highlight-rates">Debt</span>
          <span class="highlight-steal">Rate!</span>
        </span>
      </div>

      <div class="fullWidthBar"></div>
    </div>

    <section class="topBar" aria-hidden="true">
      <div class="rateBlock">
        <div class="rateKicker">
          <span>10Y Treasury</span>
          <span class="pulseDot"></span>
        </div>
        <div class="rateNumber"><span id="dgs10Desktop">--</span><span class="pct">%</span></div>
      </div>

      <div class="brand">
        <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/debtRateCaclulator.png"
             alt="Debt Rate mascot logo">
      </div>

      <div class="rateBlock">
        <div class="rateKicker">
          <span>30Y Mortgage</span>
          <span class="pulseDot"></span>
        </div>
        <div class="rateNumber"><span id="mort30Desktop">--</span><span class="pct">%</span></div>
      </div>
    </section>

    <div class="tagline" aria-hidden="true">
      <span>
        Discover your
        <span class="highlight-rates">Debt</span>
        <span class="highlight-steal">Rate!</span>
      </span>
    </div>

    <div class="fullWidthBar"></div>

    <div class="mobileContent">
      <section class="card">
        <header class="cardHeader">
          <h2 id="debtRateHeading">Debt Rate = ?</h2>
        </header>
      </section>

      <section class="calculatorShell">
        <div class="debtHeaderRow">
          <div class="debtHeaderCell">Type</div>
          <div class="debtHeaderCell">Balance</div>
          <div class="debtHeaderCell">Payment</div>
          <div class="debtHeaderCell">Payment %</div>
        </div>

        <div class="debtRows" id="debtRows">
          <div class="debtRow">
            <select class="calcField debtType" name="debtType[]">
              <option value="CC">CC</option>
              <option value="Auto">Auto</option>
              <option value="M">M</option>
              <option value="L">L</option>
            </select>

            <input
              class="calcField balance"
              type="text"
              name="balance[]"
              inputmode="decimal"
              placeholder="Balance">

            <input
              class="calcField payment"
              type="text"
              name="payment[]"
              inputmode="decimal"
              placeholder="Payment">

            <div class="calcField percentDisplay">?</div>
          </div>
        </div>

        <div class="addRowWrap">
          <button type="button" class="removeRowBtn" id="removeDebtRowBtn" aria-label="Remove debt row">−</button>
          <button type="button" class="addRowBtn" id="addDebtRowBtn" aria-label="Add debt row">+</button>
        </div>
      </section>
    </div>
  </main>

  <script>
    const PROXY_BASE = "https://yellow-sea-71b2.captainkimmer07.workers.dev";

    function updateMobileHeaderHeight(){
      const isMobile = window.matchMedia("(max-width: 760px)").matches;
      const fixed = document.querySelector(".mobileFixedHeader");
      if(!fixed) return;

      if(isMobile){
        fixed.style.display = "block";
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            const h = fixed.getBoundingClientRect().height;
            document.documentElement.style.setProperty("--mobileHeaderH", Math.ceil(h) + "px");
          });
        });
      }else{
        document.documentElement.style.setProperty("--mobileHeaderH", "0px");
      }
    }

    function setRateText(ids, valueStr){
      const num = Number(valueStr);
      if (!Number.isFinite(num)) return;
      const formatted = num.toFixed(2);
      ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = formatted;
      });
    }

    async function fetchRate(series){
      const url = `${PROXY_BASE}?series=${encodeURIComponent(series)}`;
      const res = await fetch(url, { cache: "no-store" });
      if(!res.ok){
        let details = "";
        try { details = await res.text(); } catch {}
        throw new Error(`Worker ${res.status} for ${series}: ${details}`);
      }
      const data = await res.json();
      if (!data || !data.value) throw new Error(`Bad JSON for ${series}: ${JSON.stringify(data)}`);
      return data.value;
    }

    async function updateHeaderRates(){
      try{
        const [dgs10, mort30] = await Promise.all([
          fetchRate("DGS10"),
          fetchRate("MORTGAGE30US")
        ]);
        setRateText(["dgs10Desktop","dgs10Mobile"], dgs10);
        setRateText(["mort30Desktop","mort30Mobile"], mort30);
      }catch(e){
        console.error("Rate update failed:", e);
      }
    }

    function syncHeaderVisibility(){
      const isMobile = window.matchMedia("(max-width: 760px)").matches;
      const fixed = document.querySelector(".mobileFixedHeader");
      const desktopTop = document.querySelector('section.topBar[aria-hidden="true"]');
      const desktopTagline = document.querySelector('.tagline[aria-hidden="true"]');
      const desktopBar = desktopTagline?.nextElementSibling;

      if(isMobile){
        if(fixed) fixed.style.display = "block";
        if(desktopTop) desktopTop.style.display = "none";
        if(desktopTagline) desktopTagline.style.display = "none";
        if(desktopBar) desktopBar.style.display = "none";
      }else{
        if(fixed) fixed.style.display = "none";
        if(desktopTop) desktopTop.style.display = "grid";
        if(desktopTagline) desktopTagline.style.display = "block";
        if(desktopBar) desktopBar.style.display = "block";
      }
    }

    function refreshLayout(){
      syncHeaderVisibility();
      updateMobileHeaderHeight();
    }

    function parseNumber(value){
      if (!value) return NaN;
      const cleaned = String(value).replace(/[$,%\s,]/g, "");
      return parseFloat(cleaned);
    }

    function updatePaymentPercent(row){
      const balanceInput = row.querySelector(".balance");
      const paymentInput = row.querySelector(".payment");
      const percentDisplay = row.querySelector(".percentDisplay");

      const balance = parseNumber(balanceInput.value);
      const payment = parseNumber(paymentInput.value);

      if (!Number.isFinite(balance) || !Number.isFinite(payment) || balance <= 0) {
        percentDisplay.textContent = "?";
        return;
      }

      const percent = (payment / balance) * 100;
      percentDisplay.textContent = percent.toFixed(2) + "%";
    }

    function attachRowListeners(row){
      const balanceInput = row.querySelector(".balance");
      const paymentInput = row.querySelector(".payment");

      balanceInput.addEventListener("input", () => updatePaymentPercent(row));
      paymentInput.addEventListener("input", () => updatePaymentPercent(row));
    }

    function createDebtRow(){
      const row = document.createElement("div");
      row.className = "debtRow";
      row.innerHTML = `
        <select class="calcField debtType" name="debtType[]">
          <option value="CC">CC</option>
          <option value="Auto">Auto</option>
          <option value="M">M</option>
          <option value="L">L</option>
        </select>

        <input
          class="calcField balance"
          type="text"
          name="balance[]"
          inputmode="decimal"
          placeholder="Balance">

        <input
          class="calcField payment"
          type="text"
          name="payment[]"
          inputmode="decimal"
          placeholder="Payment">

        <div class="calcField percentDisplay">?</div>
      `;

      attachRowListeners(row);
      return row;
    }

    const addDebtRowBtn = document.getElementById("addDebtRowBtn");
    const removeDebtRowBtn = document.getElementById("removeDebtRowBtn");
    const debtRows = document.getElementById("debtRows");

    document.querySelectorAll(".debtRow").forEach(row => {
      attachRowListeners(row);
      updatePaymentPercent(row);
    });

    if (addDebtRowBtn && debtRows) {
      addDebtRowBtn.addEventListener("click", () => {
        debtRows.appendChild(createDebtRow());
      });
    }

    if (removeDebtRowBtn && debtRows) {
      removeDebtRowBtn.addEventListener("click", () => {
        const rows = debtRows.querySelectorAll(".debtRow");
        if (rows.length > 1) {
          rows[rows.length - 1].remove();
        }
      });
    }

    refreshLayout();
    updateHeaderRates();

    window.addEventListener("resize", refreshLayout);

    window.addEventListener("load", () => {
      refreshLayout();
      updateHeaderRates();
      setTimeout(updateMobileHeaderHeight, 0);
      setTimeout(updateMobileHeaderHeight, 80);
      setTimeout(updateMobileHeaderHeight, 220);
    });
  </script>
</body>
</html>
