<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Debt Rate Calculator</title>

  <link rel="icon" type="image/png" sizes="32x32"
        href="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/favicon_io/favicon-32x32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --ink:#ffffff;
      --muted:#e2e8f0;
      --green1:#16a34a;
      --green2:#065f46;
      --blue:#2563eb;
      --shadow:0 14px 40px rgba(2,6,23,.22);
      --maxw:980px;
    }

    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      padding:0;
      min-height:100%;
    }

    body{
      min-height:100svh;
      font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--ink);
      display:flex;
      justify-content:center;
      padding:18px;
      background-image:url("https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/oceanBackground.png");
      background-size:cover;
      background-position:50% 10%;
      background-repeat:no-repeat;
      background-attachment:fixed;
      overflow-x:hidden;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(7,22,45,0.16);
      pointer-events:none;
      z-index:0;
    }

    .wrap{
      width:min(var(--maxw),100%);
      position:relative;
      z-index:1;
    }

    .topBar{
      display:grid;
      grid-template-columns:1.25fr auto 1.25fr;
      align-items:center;
      gap:18px;
    }

    .rateBlock{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      padding:10px 8px;
      border-radius:18px;
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(4px);
      -webkit-backdrop-filter:blur(4px);
      box-shadow:var(--shadow);
    }

    .rateKicker{
      display:flex;
      align-items:center;
      gap:10px;
      color:#f8fafc;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.14em;
      font-size:.78rem;
      margin-bottom:6px;
      text-shadow:0 2px 6px rgba(0,0,0,.35);
    }

    .pulseDot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--green1),var(--blue));
      animation:pulse 1.7s ease-out infinite;
      flex:0 0 auto;
    }

    @keyframes pulse{
      0%{ box-shadow:0 0 0 0 rgba(22,163,74,.30); }
      60%{ box-shadow:0 0 0 14px rgba(22,163,74,0); }
      100%{ box-shadow:0 0 0 0 rgba(22,163,74,0); }
    }

    .rateNumber{
      font-size:clamp(3rem,6vw,4.8rem);
      font-weight:900;
      color:#ffffff;
      text-shadow:
        0 6px 18px rgba(0,0,0,.42),
        0 2px 4px rgba(0,0,0,.28);
      white-space:nowrap;
      line-height:1;
    }

    .pct{
      font-size:.4em;
      position:relative;
      top:-0.3em;
    }

    .brand{
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .brand img{
      width:min(210px,58vw);
      display:block;
      filter:drop-shadow(0 10px 26px rgba(0,0,0,.35));
    }

    .tagline{
      text-align:center;
      font-family:"Cinzel",serif;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.06em;
      font-size:clamp(1.05rem,2vw,1.45rem);
      margin:14px 0 12px;
      position:relative;
    }

    .tagline span{
      display:inline-block;
      color:#f4c542;
      text-shadow:
        0 2px 6px rgba(0,0,0,.45),
        0 1px 0 rgba(255,255,255,.18);
      position:relative;
    }

    .highlight-debt{
      color:#ef4444;
      text-shadow:
        0 2px 12px rgba(239,68,68,.55),
        0 2px 6px rgba(0,0,0,.35);
    }

    .highlight-rate{
      color:#dc2626;
      text-shadow:
        0 2px 12px rgba(220,38,38,.55),
        0 2px 6px rgba(0,0,0,.35);
    }

    .tagline span::after{
      content:"";
      position:absolute;
      top:0;
      left:-75%;
      width:50%;
      height:100%;
      background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.7),
        transparent
      );
      transform:skewX(-20deg);
      animation:shineText 3.5s infinite;
    }

    @keyframes shineText{
      0%{ left:-75%; }
      100%{ left:125%; }
    }

    .fullWidthBar{
      height:14px;
      width:100%;
      margin-bottom:14px;
      background:linear-gradient(to bottom,#0b1220,#111827);
      border-radius:999px;
      box-shadow:
        0 10px 22px rgba(0,0,0,.36),
        inset 0 1px 2px rgba(255,255,255,.08);
    }

    .cardHeader{
      text-align:center;
      background:linear-gradient(135deg,var(--green1),var(--green2));
      border-radius:18px;
      overflow:hidden;
      box-shadow:var(--shadow);
      backdrop-filter:blur(2px);
      -webkit-backdrop-filter:blur(2px);
    }

    .cardHeader h2{
      margin:0;
      padding:18px;
      font-family:"Cinzel",serif;
      font-size:2rem;
      font-weight:900;
      color:#fff;
      letter-spacing:.08em;
      text-shadow:0 4px 14px rgba(0,0,0,.28);
      white-space:nowrap;
    }

    @media (max-width:760px){
      body{
        padding:10px 4px;
        background-position:58% 0%;
      }

      .topBar{
        grid-template-columns:1fr auto 1fr;
        gap:8px;
        align-items:center;
      }

      .rateBlock{
        padding:8px 4px;
        border-radius:14px;
      }

      .rateKicker{
        font-size:.56rem;
        margin-bottom:4px;
        gap:6px;
      }

      .rateNumber{
        font-size:1.6rem;
      }

      .brand img{
        width:180px;
      }

      .tagline{
        font-size:.85rem;
        margin:12px 0 10px;
      }

      .fullWidthBar{
        height:12px;
        margin-bottom:12px;
      }

      .cardHeader{
        border-radius:16px;
      }

      .cardHeader h2{
        font-size:1.2rem;
        padding:16px 10px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">

    <section class="topBar">
      <div class="rateBlock">
        <div class="rateKicker">
          <span>10Y Treasury</span>
          <span class="pulseDot"></span>
        </div>
        <div class="rateNumber">
          <span id="dgs10">--</span><span class="pct">%</span>
        </div>
      </div>

      <div class="brand">
        <img
          src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/debtRateCaclulator.png"
          alt="Debt Rate mascot logo">
      </div>

      <div class="rateBlock">
        <div class="rateKicker">
          <span>30Y Mortgage</span>
          <span class="pulseDot"></span>
        </div>
        <div class="rateNumber">
          <span id="mort30">--</span><span class="pct">%</span>
        </div>
      </div>
    </section>

    <div class="tagline">
      <span>
        Discover your
        <span class="highlight-debt">Debt</span>
        <span class="highlight-rate">Rate</span>!
      </span>
    </div>

    <div class="fullWidthBar"></div>

    <section class="cardHeader">
      <h2 id="debtRateHeading">Debt Rate = ?</h2>
    </section>

  </main>

  <script>
    const PROXY_BASE = "https://yellow-sea-71b2.captainkimmer07.workers.dev";

    function setRateText(id, valueStr){
      const num = Number(valueStr);
      if (!Number.isFinite(num)) return;
      const el = document.getElementById(id);
      if (el) el.textContent = num.toFixed(2);
    }

    async function fetchRate(series){
      const res = await fetch(`${PROXY_BASE}?series=${encodeURIComponent(series)}`, {
        cache: "no-store"
      });

      if (!res.ok) {
        throw new Error(`Failed to fetch ${series}`);
      }

      const data = await res.json();
      return data.value;
    }

    async function updateRates(){
      try{
        const [dgs10, mort30] = await Promise.all([
          fetchRate("DGS10"),
          fetchRate("MORTGAGE30US")
        ]);

        setRateText("dgs10", dgs10);
        setRateText("mort30", mort30);
      }catch(e){
        console.error("Rate update failed:", e);
      }
    }

    updateRates();
  </script>
</body>
</html>
