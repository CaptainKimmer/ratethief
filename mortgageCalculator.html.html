<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Debt Rate Calculator</title>

  <link rel="icon" type="image/png" sizes="32x32"
        href="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/favicon_io/favicon-32x32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f8f7f3;
      --ink:#0f172a;
      --muted:#475569;
      --green1:#16a34a;
      --green2:#065f46;
      --blue:#2563eb;
      --shadow:0 14px 40px rgba(2,6,23,.08);
      --maxw:980px;
    }

    *{box-sizing:border-box;}

    body{
      margin:0;
      min-height:100svh;
      font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--ink);
      background:var(--bg);
      display:flex;
      justify-content:center;
      padding:18px;
    }

    .wrap{
      width:min(var(--maxw),100%);
    }

    .topBar{
      display:grid;
      grid-template-columns:1.25fr auto 1.25fr;
      align-items:center;
      gap:18px;
    }

    .rateBlock{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
    }

    .rateKicker{
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--muted);
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.14em;
      font-size:.78rem;
      margin-bottom:6px;
    }

    .pulseDot{
      width:10px;height:10px;border-radius:50%;
      background:linear-gradient(135deg,var(--green1),var(--blue));
      animation:pulse 1.7s ease-out infinite;
    }

    @keyframes pulse{
      0%{box-shadow:0 0 0 0 rgba(22,163,74,.28)}
      60%{box-shadow:0 0 0 14px rgba(22,163,74,0)}
      100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}
    }

    .rateNumber{
      font-size:clamp(3rem,6vw,4.8rem);
      font-weight:900;
      color:#0b1535;
    }

    .pct{
      font-size:.4em;
      position:relative;
      top:-0.3em;
    }

    .brand{
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .brand img{
      width:min(210px,58vw);
    }

    /* FLASHY TAGLINE */
    .tagline{
      text-align:center;
      font-family:"Cinzel",serif;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.06em;
      font-size:clamp(1.05rem,2vw,1.45rem);
      margin:10px 0 12px;
      position:relative;
    }

    .tagline span{
      display:inline-block;
      color:#b8860b;
      text-shadow:
        0 2px 6px rgba(0,0,0,.25),
        0 1px 0 rgba(255,255,255,.25);
      position:relative;
    }

    .highlight-debt{
      color:#dc2626;
      text-shadow:0 2px 10px rgba(220,38,38,.45);
    }

    .highlight-rate{
      color:#b91c1c;
      text-shadow:0 2px 10px rgba(185,28,28,.45);
    }

    .tagline span::after{
      content:"";
      position:absolute;
      top:0;
      left:-75%;
      width:50%;
      height:100%;
      background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.6),
        transparent
      );
      transform:skewX(-20deg);
      animation:shineText 3.5s infinite;
    }

    @keyframes shineText{
      0%{ left:-75%; }
      100%{ left:125%; }
    }

    .fullWidthBar{
      height:14px;
      width:100%;
      margin-bottom:14px;
      background:linear-gradient(to bottom,#0b1220,#111827);
      border-radius:999px;
      box-shadow:0 10px 22px rgba(0,0,0,.30);
    }

    .cardHeader{
      text-align:center;
      background:linear-gradient(135deg,var(--green1),var(--green2));
      border-radius:18px;
      overflow:hidden;
    }

    .cardHeader h2{
      margin:0;
      padding:18px;
      font-family:"Cinzel",serif;
      font-size:2rem;
      font-weight:900;
      color:#fff;
      letter-spacing:.08em;
    }

    @media(max-width:760px){
      .rateNumber{font-size:1.6rem;}
      .brand img{width:180px;}
      .tagline{font-size:.85rem;}
      .cardHeader h2{font-size:1.2rem;}
    }
  </style>
</head>

<body>
  <main class="wrap">

    <section class="topBar">
      <div class="rateBlock">
        <div class="rateKicker">
          <span>10Y Treasury</span>
          <span class="pulseDot"></span>
        </div>
        <div class="rateNumber">
          <span id="dgs10">--</span><span class="pct">%</span>
        </div>
      </div>

      <div class="brand">
        <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/debtRateCaclulator.png">
      </div>

      <div class="rateBlock">
        <div class="rateKicker">
          <span>30Y Mortgage</span>
          <span class="pulseDot"></span>
        </div>
        <div class="rateNumber">
          <span id="mort30">--</span><span class="pct">%</span>
        </div>
      </div>
    </section>

    <div class="tagline">
      <span>
        Discover your 
        <span class="highlight-debt">Debt</span> 
        <span class="highlight-rate">Rate</span>!
      </span>
    </div>

    <div class="fullWidthBar"></div>

    <section class="cardHeader">
      <h2 id="debtRateHeading">Debt Rate = ?</h2>
    </section>

  </main>

  <script>
    const PROXY_BASE = "https://yellow-sea-71b2.captainkimmer07.workers.dev";

    function setRateText(id, valueStr){
      const num = Number(valueStr);
      if (!Number.isFinite(num)) return;
      document.getElementById(id).textContent = num.toFixed(2);
    }

    async function fetchRate(series){
      const res = await fetch(`${PROXY_BASE}?series=${series}`);
      const data = await res.json();
      return data.value;
    }

    async function updateRates(){
      try{
        const [dgs10, mort30] = await Promise.all([
          fetchRate("DGS10"),
          fetchRate("MORTGAGE30US")
        ]);
        setRateText("dgs10", dgs10);
        setRateText("mort30", mort30);
      }catch(e){
        console.error(e);
      }
    }

    updateRates();
  </script>

</body>
</html>
