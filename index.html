<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Get a Rate!</title>

  <link rel="icon" type="image/png" sizes="32x32"
        href="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/favicon_io/favicon-32x32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#ffffff;
      --ink:#0f172a;
      --line:#e5e7eb;
      --accent:#16a34a;
      --shadow:0 14px 40px rgba(2,6,23,.08);
      --maxw:980px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:#f8f7f3;
      display:flex;
      justify-content:center;
      padding:18px;
    }

    .wrap{
      width:min(var(--maxw),100%);
      display:grid;
      gap:14px;
    }

    /* ================= HEADER ================= */

    .brand{
      display:flex;
      justify-content:center;
    }

    .brand img{
      width:180px;
      filter:drop-shadow(0 10px 22px rgba(2,6,23,.14));
    }

    .tagline{
      text-align:center;
      font-family:"Cinzel",serif;
      font-weight:900;
      font-size:1.4rem;
      letter-spacing:.05em;
      text-transform:uppercase;
    }

    .highlight-rates{ color:#16a34a; }
    .highlight-steal{ color:#065f46; }

    .bar{
      height:14px;
      background:#0b1220;
      border-radius:999px;
    }

    /* ================= CARD ================= */

    .card{
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .cardHeader{
      text-align:center;
      padding:20px 10px;
      background:linear-gradient(135deg,#16a34a,#065f46);
      color:#fff;
      position:relative;
      overflow:hidden;
    }

    /* FLASHY CTA */
    .cardHeader h2{
      margin:0;
      font-family:"Cinzel",serif;
      font-size:2rem;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      animation:ctaGlow 2.5s ease-in-out infinite;
    }

    @keyframes ctaGlow{
      0%{ text-shadow:0 0 0px rgba(255,255,255,.0); }
      50%{ text-shadow:0 0 18px rgba(255,255,255,.7); }
      100%{ text-shadow:0 0 0px rgba(255,255,255,.0); }
    }

    .buttonRow{
      padding:16px;
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .imgBtn{
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      padding:8px;
      transition:.15s;
      width:150px;
      text-align:center;
      cursor:pointer;
    }

    .imgBtn img{
      width:100%;
      aspect-ratio:1/1;
      object-fit:contain;
      border-radius:12px;
    }

    .imgBtn:hover{
      transform:translateY(-4px) scale(1.05);
      box-shadow:0 18px 34px rgba(2,6,23,.18);
    }

    /* ================= MODAL ================= */

    .modalOverlay{
      position:fixed;
      inset:0;
      background:rgba(2,6,23,.72);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:999;
    }
    .modalOverlay.open{ display:flex; }

    .modal{
      width:min(860px,100%);
      background:#fff;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 22px 60px rgba(2,6,23,.28);
    }

    .modalHeader{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:18px;
      background:linear-gradient(135deg,#0b1220,#111827);
      color:#fff;
      position:relative;
    }

    /* FLASHY WELCOME */
    .modalTitle{
      margin:0;
      font-family:"Cinzel",serif;
      font-weight:900;
      font-size:1.4rem;
      text-transform:uppercase;
      letter-spacing:.06em;
      animation:welcomePulse 3s ease-in-out infinite;
    }

    @keyframes welcomePulse{
      0%{ transform:scale(1); }
      50%{ transform:scale(1.05); }
      100%{ transform:scale(1); }
    }

    /* RED EXIT BUTTON */
    .modalClose{
      position:absolute;
      right:16px;
      top:14px;
      background:#dc2626;
      color:#fff;
      border:none;
      border-radius:12px;
      padding:10px 14px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 22px rgba(220,38,38,.4);
      transition:.15s;
    }

    .modalClose:hover{
      transform:scale(1.08);
      background:#b91c1c;
    }

    .modalBody{
      padding:18px;
      max-height:75vh;
      overflow:auto;
    }

  </style>
</head>

<body>

  <main class="wrap">

    <div class="brand">
      <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Mascott.png">
    </div>

    <div class="tagline">
      <span class="highlight-rates">Rates</span>
      so low it feels like
      <span class="highlight-steal">stealing!</span>
    </div>

    <div class="bar"></div>

    <section class="card">
      <header class="cardHeader">
        <h2>CHOOSE YOUR GOAL</h2>
      </header>

      <div class="buttonRow">
        <!-- Your buttons remain unchanged here -->
      </div>
    </section>

  </main>

  <!-- MODAL -->
  <div class="modalOverlay" id="modal">
    <div class="modal">
      <div class="modalHeader">
        <h2 class="modalTitle">Welcome to RateThief.com!</h2>
        <button class="modalClose" id="modalClose">EXIT ✕</button>
      </div>
      <div class="modalBody" id="modalBody"></div>
    </div>
  </div>

  <script>
    const modalOverlay = document.getElementById("modal");
    const modalBody = document.getElementById("modalBody");
    const closeBtn = document.getElementById("modalClose");

    function openModal(){
      modalOverlay.classList.add("open");
      document.body.style.overflow="hidden";
    }

    function closeModal(){
      modalOverlay.classList.remove("open");
      document.body.style.overflow="";
    }

    async function loadModalFile(file){
      const res = await fetch(file);
      const html = await res.text();
      modalBody.innerHTML = html;
    }

    closeBtn.addEventListener("click", closeModal);

    window.addEventListener("load", async ()=>{
      openModal();
      await loadModalFile("contact.html");
    });
  </script>

</body>
</html>
