<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Get a Rate!</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32"
        href="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/favicon_io/favicon-32x32.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#ffffff;
      --card:#ffffff;
      --ink:#0f172a;
      --muted:#475569;
      --line:#e5e7eb;
      --accent:#16a34a;
      --accent2:#2563eb;
      --shadow:0 14px 40px rgba(2,6,23,.08);
      --radius:18px;
      --radius2:14px;
      --maxw:980px;
      --mobileHeaderH:0px;
      --mobileGap:4px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100svh;
      font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--ink);
      background:#f8f7f3;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:18px;
    }

    .wrap{
      width:min(var(--maxw),100%);
      display:grid;
      gap:10px;
    }

    .topBar{
      display:grid;
      grid-template-columns:1.25fr auto 1.25fr;
      gap:18px;
      align-items:center;
      margin-top:2px;
    }

    .brand{
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .brand img{
      width:min(210px,58vw);
      height:auto;
      filter:drop-shadow(0 10px 22px rgba(2,6,23,.14));
    }

    .tagline{
      text-align:center;
      font-family:"Cinzel",serif;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.05em;
      font-size:clamp(1.05rem,2vw,1.45rem);
      margin:0;
      padding:0 8px 0;
      line-height:1.15;
      position:relative;
      display:block;
      width:100%;
      overflow:hidden;
    }

    .tagline > span{
      color:#b8860b;
      text-shadow:
        0 2px 6px rgba(0,0,0,.18),
        0 1px 0 rgba(255,255,255,.30);
      position:relative;
      display:inline-block;
    }

    .highlight-rates{
      color:#16a34a;
      text-shadow:0 2px 8px rgba(22,163,74,.18);
    }

    .highlight-steal{
      color:#065f46;
      text-shadow:0 2px 8px rgba(6,95,70,.18);
    }

    .fullWidthBar{
      height:14px;
      width:100%;
      margin-top:2px;
      margin-bottom:0px;
      background:linear-gradient(to bottom,#0b1220 0%,#0b1220 60%,#111827 100%);
      border-radius:999px;
      box-shadow:
        0 10px 22px rgba(0,0,0,.30),
        inset 0 2px 2px rgba(255,255,255,.08),
        inset 0 -3px 6px rgba(0,0,0,.45);
    }

    .card{
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:var(--card);
      box-shadow:var(--shadow);
      overflow:hidden;
      margin-top:0px;
    }

    .cardHeader{
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      text-align:center;
    }

    .cardHeader h2{
      margin:0;
      font-family:"Cinzel",serif;
      font-size:1.85rem;
      letter-spacing:.07em;
      font-weight:900;
      text-transform:uppercase;
      line-height:1.05;
    }

    .buttonRow{
      padding:14px;
      display:flex;
      gap:12px;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
    }

    .imgBtn{
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      box-shadow:0 10px 22px rgba(2,6,23,.06);
      cursor:pointer;
      padding:8px;
      transition:.14s;
      flex:1 1 140px;
      max-width:160px;
      transform-origin:center;
      display:block;
      text-decoration:none;
      color:inherit;
    }

    .imgBtn:hover{
      transform:translateY(-2px) scale(1.03);
      border-color:rgba(22,163,74,.35);
      box-shadow:0 18px 34px rgba(2,6,23,.10);
    }

    .imgBtn img{
      width:100%;
      height:auto;
      aspect-ratio:1/1;
      object-fit:contain;
      border-radius:12px;
      display:block;
    }

    /* NEW AD DISCLOSURE STYLE */
    .adDisclosure{
      text-align:center;
      margin-top:10px;
    }

    .adDisclosure a{
      font-size:.78rem;
      color:#64748b;
      text-decoration:underline;
      font-weight:600;
      transition:.15s ease;
    }

    .adDisclosure a:hover{
      opacity:.7;
    }

    .fineprint{
      color:#64748b;
      font-size:.82rem;
      text-align:center;
      margin-top:2px;
    }
  </style>
</head>

<body>
  <main class="wrap">

    <div class="mobileContent">
      <section class="card">
        <header class="cardHeader">
          <h2>CHOOSE YOUR GOAL</h2>
        </header>

        <div class="buttonRow">

          <a href="https://docs.google.com/forms/d/e/1FAIpQLSfkCsj5cuTngElW-Nz7Ybi3zW_FT_xLdJ2jaKhEzYBFtd50wA/viewform?usp=header"
             target="_blank" rel="noopener noreferrer"
             class="imgBtn" aria-label="Pay Off Debts">
            <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/payOffDebts.png" alt="Pay Off Debts">
          </a>

          <a href="#" class="imgBtn"><img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/cashOut.png" alt="Cash Out"></a>

          <a href="#" class="imgBtn"><img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/refinanceButton.png" alt="Lower Rate"></a>

          <a href="#" class="imgBtn"><img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/HELOCbutton.png" alt="HELOC"></a>

          <a href="#" class="imgBtn"><img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/purchaseButton.png" alt="Purchase"></a>

          <a href="#" class="imgBtn"><img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/reverseMortgage.png" alt="Reverse Mortgage"></a>

        </div>
      </section>

      <!-- NEW AD DISCLOSURE LINK -->
      <div class="adDisclosure">
        <a href="#">*Advertising Disclosure</a>
      </div>

      <div class="fineprint">
        Example rates shown for demonstration only. Final pricing depends on credit, equity, occupancy, and timing.
      </div>

    </div>
  </main>
</body>
</html>
