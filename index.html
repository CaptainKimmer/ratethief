<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Get a Rate!</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32"
        href="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/favicon_io/favicon-32x32.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#ffffff;
      --card:#ffffff;
      --ink:#0f172a;
      --muted:#475569;
      --line:#e5e7eb;
      --accent:#16a34a;
      --accent2:#2563eb;
      --shadow:0 14px 40px rgba(2,6,23,.08);
      --radius:18px;
      --radius2:14px;
      --maxw:980px;

      --mobileHeaderH:0px;
      --mobileGap:4px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100svh;
      font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--ink);
      background:#f8f7f3;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:18px;
    }

    .wrap{
      width:min(var(--maxw),100%);
      display:grid;
      gap:10px;
    }

    .topBar{
      display:grid;
      grid-template-columns:1.25fr auto 1.25fr;
      gap:18px;
      align-items:center;
      margin-top:2px;
    }

    .brand{
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .brand img{
      width:min(210px,58vw);
      height:auto;
      filter:drop-shadow(0 10px 22px rgba(2,6,23,.14));
    }

    /* TAGLINE */
    .tagline{
      text-align:center;
      font-family:"Cinzel",serif;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.05em;
      font-size:clamp(1.05rem,2vw,1.45rem);
      margin:0;
      padding:0 8px 0;
      line-height:1.15;
      position:relative;
      display:block;
      width:100%;
      overflow:hidden;
    }

    .tagline > span{
      background:linear-gradient(
        100deg,
        #7a5c00 0%,
        #b8860b 20%,
        #ffd700 35%,
        #fff2a6 45%,
        #ffd700 55%,
        #b8860b 75%,
        #7a5c00 100%
      );
      background-size:200% auto;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      animation:goldShimmer 6s linear infinite;
      position:relative;
      display:inline-block;
    }

    @keyframes goldShimmer{
      0%{background-position:0% center;}
      100%{background-position:200% center;}
    }

    .tagline > span::after{
      content:"";
      position:absolute;
      top:0;
      left:-75%;
      width:50%;
      height:100%;
      background:linear-gradient(
        120deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,.65) 50%,
        rgba(255,255,255,0) 100%
      );
      transform:skewX(-25deg);
      animation:glint 4.5s ease-in-out infinite;
      pointer-events:none;
    }

    @keyframes glint{
      0%{ left:-75%; }
      60%{ left:125%; }
      100%{ left:125%; }
    }

    .highlight-steal{
      color:#065f46;
      -webkit-text-fill-color:#065f46;
      text-shadow:0 2px 8px rgba(6,95,70,.18);
    }

    .fullWidthBar{
      height:14px;
      width:100%;
      margin-top:2px;
      background:linear-gradient(to bottom,#0b1220 0%,#0b1220 60%,#111827 100%);
      border-radius:999px;
      box-shadow:
        0 10px 22px rgba(0,0,0,.30),
        inset 0 2px 2px rgba(255,255,255,.08),
        inset 0 -3px 6px rgba(0,0,0,.45);
    }

    @media (max-width:760px){
      .tagline{
        font-size:.82rem;
        margin:2px 0 4px;
        white-space:nowrap;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">

    <!-- MOBILE HEADER -->
    <div class="mobileFixedHeader">
      <div class="tagline">
        <span>
          Get a rate so low it feels like <span class="highlight-steal">stealing!</span>
        </span>
      </div>
    </div>

    <!-- DESKTOP TAGLINE -->
    <div class="tagline" aria-hidden="true">
      <span>
        Get a rate so low it feels like <span class="highlight-steal">stealing!</span>
      </span>
    </div>

    <div class="fullWidthBar"></div>

  </main>
</body>
</html>
