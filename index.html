<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Get a Rate!</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32"
        href="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/favicon_io/favicon-32x32.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#ffffff;
      --card:#ffffff;
      --ink:#0f172a;
      --muted:#475569;
      --line:#e5e7eb;
      --accent:#16a34a;
      --accent2:#2563eb;
      --shadow:0 14px 40px rgba(2,6,23,.08);
      --radius:18px;
      --maxw:980px;
      --mobileHeaderH:0px;
      --mobileGap:4px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100svh;
      font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--ink);
      background:#f8f7f3;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:18px;
    }

    .wrap{
      width:min(var(--maxw),100%);
      display:grid;
      gap:10px;
    }

    .topBar{
      display:grid;
      grid-template-columns:1.25fr auto 1.25fr;
      gap:18px;
      align-items:center;
      margin-top:2px;
    }

    .brand{
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .brand img{
      width:min(210px,58vw);
      height:auto;
      filter:drop-shadow(0 10px 22px rgba(2,6,23,.14));
    }

    .tagline{
      text-align:center;
      font-family:"Cinzel",serif;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.05em;
      font-size:clamp(1.05rem,2vw,1.45rem);
      margin:0;
      padding:0 8px 0;
      line-height:1.15;
    }

    .highlight-rates{ color:#16a34a; }
    .highlight-steal{ color:#065f46; }

    .fullWidthBar{
      height:14px;
      width:100%;
      margin-top:2px;
      background:linear-gradient(to bottom,#0b1220 0%,#111827 100%);
      border-radius:999px;
    }

    .card{
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .cardHeader{
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      text-align:center;
    }

    .cardHeader h2{
      margin:0;
      font-family:"Cinzel",serif;
      font-size:1.85rem;
      letter-spacing:.07em;
      font-weight:900;
      text-transform:uppercase;
    }

    .buttonRow{
      padding:14px;
      display:flex;
      gap:12px;
      justify-content:space-between;
      flex-wrap:wrap;
    }

    .imgBtn{
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      cursor:pointer;
      padding:8px;
      transition:.14s;
      flex:1 1 140px;
      max-width:160px;
      display:block;
      text-decoration:none;
    }

    .imgBtn img{
      width:100%;
      aspect-ratio:1/1;
      object-fit:contain;
      border-radius:12px;
    }

    footer.siteFooter{
      margin-top:18px;
      border-top:1px solid var(--line);
      padding:16px 12px 22px;
      font-size:.82rem;
      text-align:center;
    }

    /* ===== MODAL ===== */

    .modalOverlay{
      position:fixed;
      inset:0;
      background:rgba(2,6,23,.72);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:999;
    }
    .modalOverlay.open{ display:flex; }

    .modal{
      width:min(860px,100%);
      background:#fff;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 22px 60px rgba(2,6,23,.28);
    }

    .modalHeader{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
      border-bottom:1px solid var(--line);
      position:relative;
    }

    .modalTitle{
      margin:0;
      font-family:"Cinzel",serif;
      letter-spacing:.06em;
      font-weight:900;
      text-transform:uppercase;
      font-size:1.1rem;
      text-align:center;
    }

    .modalClose{
      position:absolute;
      right:14px;
      top:12px;
      border:2px solid #0f172a;
      background:#fff;
      border-radius:12px;
      padding:8px 12px;
      cursor:pointer;
      font-weight:900;
    }

    .modalBody{
      padding:16px;
      max-height:75vh;
      overflow:auto;
    }
  </style>
</head>

<body>
  <main class="wrap">

    <!-- HEADER -->
    <section class="topBar">
      <div></div>
      <div class="brand">
        <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Mascott.png">
      </div>
      <div></div>
    </section>

    <div class="tagline">
      <span class="highlight-rates">Rates</span>
      so low it feels like
      <span class="highlight-steal">stealing!</span>
    </div>

    <div class="fullWidthBar"></div>

    <!-- MAIN -->
    <section class="card">
      <header class="cardHeader">
        <h2>CHOOSE YOUR GOAL</h2>
      </header>

      <div class="buttonRow">
        <!-- your buttons stay the same -->
      </div>
    </section>

  </main>

  <!-- MODAL -->
  <div class="modalOverlay" id="modal">
    <div class="modal">
      <div class="modalHeader">
        <h2 class="modalTitle" id="modalTitle">Welcome to Rate Thief!</h2>
        <button class="modalClose" id="modalClose">EXIT ↩</button>
      </div>
      <div class="modalBody" id="modalBody"></div>
    </div>
  </div>

  <script>
    const modalOverlay = document.getElementById("modal");
    const modalBody = document.getElementById("modalBody");
    const closeBtn = document.getElementById("modalClose");

    function openModal(){
      modalOverlay.classList.add("open");
      document.body.style.overflow="hidden";
    }

    function closeModal(){
      modalOverlay.classList.remove("open");
      document.body.style.overflow="";
    }

    async function loadModalFile(file){
      const res = await fetch(file);
      const html = await res.text();
      modalBody.innerHTML = html;
    }

    closeBtn.addEventListener("click", closeModal);

    window.addEventListener("load", async ()=>{
      openModal();
      await loadModalFile("contact.html");
    });
  </script>
</body>
</html>
