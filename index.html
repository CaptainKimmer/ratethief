<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Rate Options</title>

<link rel="icon" type="image/png" sizes="32x32"
href="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/favicon_io/favicon-32x32.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
--bg:#ffffff;
--card:#ffffff;
--ink:#0f172a;
--muted:#475569;
--line:#e5e7eb;
--accent:#16a34a;
--accent2:#2563eb;
--shadow:0 14px 40px rgba(2,6,23,.08);
--radius:18px;
--maxw:980px;
--mobileHeaderH:190px;
--mobileGap:6px;
}

*{box-sizing:border-box}

body{
margin:0;
min-height:100svh;
font-family:"Inter",system-ui;
color:var(--ink);
background:#f8f7f3;
display:flex;
justify-content:center;
padding:18px;
}

.wrap{
width:min(var(--maxw),100%);
display:grid;
gap:10px;
}

.topBar{
display:grid;
grid-template-columns:1fr auto 1fr;
gap:18px;
align-items:center;
}

.brand img{
width:min(210px,58vw);
filter:drop-shadow(0 10px 22px rgba(2,6,23,.14));
}

/* RATE BLOCK */
.rateBlock{
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
}

.rateKicker{
font-size:.75rem;
text-transform:uppercase;
letter-spacing:.12em;
color:var(--muted);
font-weight:800;
margin-bottom:6px;
}

.rateNumber{
font-size:clamp(3rem,6vw,4.8rem);
font-weight:900;
line-height:1;
}

.pct{
font-size:.38em;
position:relative;
top:-0.30em;
}

/* TAGLINE */
.tagline{
text-align:center;
font-family:"Cinzel",serif;
font-weight:900;
text-transform:uppercase;
font-size:clamp(1rem,2vw,1.4rem);
}

.highlight-rates{
color:#16a34a;
}

.highlight-steal{
color:#065f46;
}

.fullWidthBar{
height:14px;
background:#111827;
border-radius:999px;
}

.card{
border:1px solid var(--line);
border-radius:var(--radius);
background:var(--card);
box-shadow:var(--shadow);
}

.cardHeader{
padding:12px;
text-align:center;
border-bottom:1px solid var(--line);
font-family:"Cinzel",serif;
font-weight:900;
}

.buttonRow{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:14px;
}

.imgBtn{
border:1px solid var(--line);
border-radius:16px;
background:#fff;
padding:8px;
cursor:pointer;
}

.imgBtn img{
width:100%;
aspect-ratio:1/1;
object-fit:contain;
border-radius:12px;
}

.fineprint{
text-align:center;
font-size:.8rem;
color:#64748b;
}
</style>
</head>

<body>
<main class="wrap">

<section class="topBar">
<div class="rateBlock">
<div class="rateKicker">10Y Treasury</div>
<div class="rateNumber"><span id="dgs10">--</span><span class="pct">%</span></div>
</div>

<div class="brand">
<img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Mascott.png">
</div>

<div class="rateBlock">
<div class="rateKicker">30Y Mortgage</div>
<div class="rateNumber"><span id="mort30">--</span><span class="pct">%</span></div>
</div>
</section>

<div class="tagline">
<span class="highlight-rates">Rates</span> so low it feels like
<span class="highlight-steal">Stealing!</span>
</div>

<div class="fullWidthBar"></div>

<section class="card">
<header class="cardHeader">CHOOSE YOUR GOAL</header>

<div class="buttonRow">
<button class="imgBtn"><img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/payOffDebts.png"></button>
<button class="imgBtn"><img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/cashOut.png"></button>
<button class="imgBtn"><img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/refinanceButton.png"></button>
<button class="imgBtn"><img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/HELOCbutton.png"></button>
<button class="imgBtn"><img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/purchaseButton.png"></button>
<button class="imgBtn"><img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/reverseMortgage.png"></button>
</div>
</section>

<div class="fineprint">
Example rates shown for demonstration only.
</div>

</main>

<script>
const PROXY_BASE = "https://yellow-sea-71b2.captainkimmer07.workers.dev";

async function fetchRate(series){
  const res = await fetch(`${PROXY_BASE}?series=${encodeURIComponent(series)}`, { cache:"no-store" });
  if(!res.ok) throw new Error("Proxy failed: " + res.status);
  const data = await res.json();
  return Number(data.value).toFixed(2);
}

async function updateRates(){
  try{
    const [dgs10, mort30] = await Promise.all([
      fetchRate("DGS10"),
      fetchRate("MORTGAGE30US")
    ]);

    document.getElementById("dgs10").textContent = dgs10;
    document.getElementById("mort30").textContent = mort30;

  }catch(e){
    console.error("Rate fetch failed:", e);
    document.getElementById("dgs10").textContent = "N/A";
    document.getElementById("mort30").textContent = "N/A";
  }
}

updateRates();
</script>

</body>
</html>
