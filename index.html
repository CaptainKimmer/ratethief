<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rate Options</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32"
        href="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/favicon_io/favicon-32x32.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: #ffffff;
      --card: #ffffff;
      --ink: #0f172a;
      --muted: #475569;
      --line: #e5e7eb;
      --accent: #16a34a;
      --accent2:#2563eb;
      --shadow: 0 14px 40px rgba(2, 6, 23, .08);
      --radius: 18px;
      --radius2: 14px;
      --maxw: 980px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100svh;
      font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--ink);
      background: var(--bg);
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding: 22px;
    }

    .wrap{
      width:min(var(--maxw), 100%);
      display:grid;
      gap:18px;
    }

    /* ===== Desktop top layout ===== */
    .topBar{
      display:grid;
      grid-template-columns: 1.25fr auto 1.25fr;
      gap:22px;
      align-items:center;
      margin-top: 6px;
    }

    .brand{
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .brand img{
      width: min(220px, 60vw);
      height:auto;
      filter: drop-shadow(0 10px 22px rgba(2,6,23,.14));
      display:block;
      margin: 0 auto;
    }

    /* ===== FULL-WIDTH black bar ===== */
    .fullWidthBar{
      height: 16px;
      width: 100%;
      margin-top: 6px;
      margin-bottom: 4px;

      background: linear-gradient(
        to bottom,
        #0b1220 0%,
        #0b1220 60%,
        #111827 100%
      );

      border-radius: 999px;
      box-shadow:
        0 10px 22px rgba(0,0,0,.30),
        inset 0 2px 2px rgba(255,255,255,.08),
        inset 0 -3px 6px rgba(0,0,0,.45);
    }

    /* ===== Rates ===== */
    .rateBlock{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      min-height: 130px;
      padding: 10px 8px;
    }

    .rateKicker{
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:center;
      color: var(--muted);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .14em;
      font-size: .78rem;
      margin-bottom: 10px;
    }

    .rateValue{
      display:flex;
      align-items:baseline;
      justify-content:center;
      gap:12px;
      line-height:1;
      margin-bottom: 8px;
    }

    .rateNumber{
      font-family: "Inter", sans-serif;
      font-size: clamp(3.8rem, 7vw, 5.2rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--ink);
      line-height: 1;
      white-space: nowrap;
    }

    .pct{
      font-size: .38em;
      font-weight: 900;
      margin-left: .10em;
      color: var(--ink);
      position: relative;
      top: -0.30em;
    }

    .rateHint{
      color:#64748b;
      font-weight: 700;
      font-size:.86rem;
      letter-spacing:.05em;
      text-transform: uppercase;
    }

    .pulseDot{
      width:10px;height:10px;border-radius:50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 0 0 rgba(22,163,74,.26);
      animation: pulse 1.7s ease-out infinite;
    }

    @keyframes pulse{
      0%{ box-shadow: 0 0 0 0 rgba(22,163,74,.28); transform: scale(1); }
      60%{ box-shadow: 0 0 0 14px rgba(22,163,74,0); transform: scale(1.04); }
      100%{ box-shadow: 0 0 0 0 rgba(22,163,74,0); transform: scale(1); }
    }

    /* ===== Main card ===== */
    .card{
      border:1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    .cardHeader{
      padding: 16px 20px;
      border-bottom:1px solid var(--line);
      text-align:center;
    }

    .cardHeader h2{
      margin:0;
      font-family: "Cinzel", serif;
      font-size: 1.45rem;
      letter-spacing:.06em;
      font-weight: 900;
      text-transform: uppercase;
      text-align:center;
    }

    /* ===== Image Buttons Row ===== */
    .buttonRow{
      padding: 16px;
      display:flex;
      gap: 14px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: nowrap;
      overflow-x: auto; /* keep one line; scroll if needed */
      scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
    }

    .imgBtn{
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 10px 22px rgba(2,6,23,.06);
      cursor:pointer;
      padding: 8px;
      flex: 0 0 auto;
      transition: transform .14s ease, box-shadow .14s ease, border-color .14s ease;
      user-select:none;
      outline: none;
    }

    .imgBtn:hover{
      transform: translateY(-2px) scale(1.05);
      border-color: rgba(22,163,74,.35);
      box-shadow: 0 18px 34px rgba(2,6,23,.10);
    }

    .imgBtn[aria-pressed="true"]{
      border-color: rgba(22,163,74,.60);
      box-shadow: 0 18px 34px rgba(22,163,74,.12);
      outline: 3px solid rgba(22,163,74,.18);
    }

    .imgBtn img{
      display:block;
      width: 140px;
      height: 140px;
      object-fit: contain;
      border-radius: 12px;
    }

    .fineprint{
      color:#64748b;
      font-size:.82rem;
      font-weight:600;
      padding: 0 4px 2px;
      text-align:center;
    }

    /* =========================================================
       MOBILE LAYOUT: Mascot on top, small rates side-by-side
       ========================================================= */
    @media (max-width: 760px){
      body{ padding: 14px; }

      /* Make the header compact so buttons take most of page */
      .wrap{ gap: 12px; }

      /* Reorder: mascot first, then rates row */
      .topBar{
        grid-template-columns: 1fr;
        gap: 10px;
        justify-items:center;
        margin-top: 2px;
      }

      /* Mascot first */
      .brand{ order: 0; }
      .brand img{ width: min(190px, 68vw); }

      /* Rates in one row, smaller */
      .rateBlock{
        min-height: unset;
        padding: 0;
      }

      /* Put both rate blocks into a compact 2-column row */
      .rateBlock:first-child{ order: 1; }
      .rateBlock:last-child{ order: 2; }

      /* Turn rate blocks into a shared row via a wrapper trick:
         We can't change DOM, so we style the two rate blocks when stacked:
         Each becomes 50% width by forcing them into a flex row container.
      */
      .topBar{
        position: relative;
      }

      /* Wrap the two rate blocks visually into a row */
      .topBar .rateBlock{
        width: 100%;
      }

      /* Create a "ratesRow" look by making the two rateBlocks inline-grid */
      .topBar{
        display:grid;
        grid-template-areas:
          "brand"
          "rates"
          "rates";
      }
      .brand{ grid-area: brand; }

      /* Use a nested grid effect by applying to a pseudo-container:
         We'll just make each rate block half width and place them side-by-side
         using a two-column grid on the topBar and explicitly placing brand full width.
      */
      .topBar{
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto;
        align-items:start;
      }
      .brand{
        grid-column: 1 / -1;
        grid-row: 1;
        justify-self:center;
      }
      .rateBlock{
        grid-row: 2;
      }
      .rateBlock:first-child{
        grid-column: 1;
      }
      .rateBlock:last-child{
        grid-column: 2;
      }

      /* Make rates compact */
      .rateKicker{
        font-size: .64rem;
        letter-spacing: .12em;
        margin-bottom: 6px;
      }

      .rateNumber{
        font-size: clamp(2.0rem, 9vw, 2.6rem);
      }
      .pct{
        top: -0.20em;
      }
      .rateHint{
        font-size: .70rem;
        letter-spacing: .06em;
      }

      /* Keep bar full width, but reduce vertical space */
      .fullWidthBar{
        height: 14px;
        margin-top: 2px;
        margin-bottom: 2px;
      }

      /* Make buttons feel bigger / dominant on mobile */
      .cardHeader{ padding: 12px 14px; }
      .cardHeader h2{ font-size: 1.15rem; }

      .buttonRow{
        padding: 12px;
        gap: 12px;
      }
      .imgBtn{
        padding: 6px;
        border-radius: 16px;
      }
      .imgBtn img{
        width: 128px;
        height: 128px;
      }

      .fineprint{
        font-size: .78rem;
        padding-top: 2px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">

    <!-- TOP -->
    <section class="topBar">

      <!-- Left rate -->
      <div class="rateBlock">
        <div class="rateKicker">
          <span>Today’s Snapshot</span>
          <span class="pulseDot"></span>
        </div>
        <div class="rateValue">
          <div class="rateNumber">4.30<span class="pct">%</span></div>
        </div>
        <div class="rateHint">Fixed-rate example</div>
      </div>

      <!-- Mascot -->
      <div class="brand">
        <img
          src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Mascott.png"
          alt="Rate Thief mascot logo">
      </div>

      <!-- Right rate -->
      <div class="rateBlock">
        <div class="rateKicker">
          <span>Fixed-Rate Options</span>
          <span class="pulseDot"></span>
        </div>
        <div class="rateValue">
          <div class="rateNumber">4.60<span class="pct">%</span></div>
        </div>
        <div class="rateHint">APR example</div>
      </div>

    </section>

    <!-- FULL-WIDTH black bar -->
    <div class="fullWidthBar" aria-hidden="true"></div>

    <!-- OPTIONS -->
    <section class="card">
      <header class="cardHeader">
        <h2>CHOOSE YOUR GOAL</h2>
      </header>

      <!-- ONE HORIZONTAL LINE of square image buttons -->
      <div class="buttonRow" role="group" aria-label="Choose your goal">

        <button class="imgBtn" type="button" data-choice="Purchase" aria-pressed="false" title="Purchase">
          <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/purchaseButton.png" alt="Purchase">
        </button>

        <button class="imgBtn" type="button" data-choice="Refinance" aria-pressed="false" title="Refinance">
          <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/refinanceButton.png" alt="Refinance">
        </button>

        <button class="imgBtn" type="button" data-choice="Cash Out" aria-pressed="false" title="Cash Out">
          <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/cashOut.png" alt="Cash Out">
        </button>

        <button class="imgBtn" type="button" data-choice="HELOC" aria-pressed="false" title="HELOC">
          <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/HELOCbutton.png" alt="HELOC">
        </button>

        <button class="imgBtn" type="button" data-choice="Reverse Mortgage" aria-pressed="false" title="Reverse Mortgage">
          <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/reverseMortgage.png" alt="Reverse Mortgage">
        </button>

      </div>
    </section>

    <div class="fineprint">
      Example rates shown for demonstration only. Final pricing depends on credit, equity, occupancy, and timing.
    </div>

  </main>

  <script>
    const btns = Array.from(document.querySelectorAll(".imgBtn"));

    function setPressed(el){
      btns.forEach(b => b.setAttribute("aria-pressed","false"));
      el.setAttribute("aria-pressed","true");
      // console.log("Selected:", el.dataset.choice);
    }

    btns.forEach(el => {
      el.addEventListener("click", () => setPressed(el));
      el.addEventListener("keydown", (e) => {
        if(e.key === "Enter" || e.key === " "){
          e.preventDefault();
          setPressed(el);
        }
      });
    });
  </script>
</body>
</html>
