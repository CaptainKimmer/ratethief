<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rate Options</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32"
        href="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/favicon_io/favicon-32x32.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: #ffffff;
      --card: #ffffff;
      --ink: #0f172a;
      --muted: #475569;
      --line: #e5e7eb;
      --accent: #16a34a;
      --accent2:#2563eb;
      --shadow: 0 14px 40px rgba(2, 6, 23, .08);
      --radius: 18px;
      --radius2: 14px;
      --maxw: 980px;

      /* Desktop default */
      --mobileHeaderH: 0px;
      --mobileGap: 10px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100svh;
      font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--ink);
      background: var(--bg);
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding: 22px;
    }

    .wrap{
      width:min(var(--maxw), 100%);
      display:grid;
      gap:18px;
    }

    /* ===========================
       DESKTOP TOP LAYOUT
       =========================== */
    .topBar{
      display:grid;
      grid-template-columns: 1.25fr auto 1.25fr;
      gap:22px;
      align-items:center;
      margin-top: 6px;
    }

    .brand{
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .brand img{
      width: min(220px, 60vw);
      height:auto;
      filter: drop-shadow(0 10px 22px rgba(2,6,23,.14));
      display:block;
      margin: 0 auto;
    }

    /* ===== FULL-WIDTH black bar ===== */
    .fullWidthBar{
      height: 16px;
      width: 100%;
      margin-top: 6px;
      margin-bottom: 4px;
      background: linear-gradient(to bottom, #0b1220 0%, #0b1220 60%, #111827 100%);
      border-radius: 999px;
      box-shadow:
        0 10px 22px rgba(0,0,0,.30),
        inset 0 2px 2px rgba(255,255,255,.08),
        inset 0 -3px 6px rgba(0,0,0,.45);
    }

    /* ===== Rates ===== */
    .rateBlock{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      min-height: 130px;
      padding: 10px 8px;
    }

    .rateKicker{
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:center;
      color: var(--muted);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .14em;
      font-size: .78rem;
      margin-bottom: 10px;
    }

    .rateValue{
      display:flex;
      align-items:baseline;
      justify-content:center;
      gap:12px;
      line-height:1;
      margin-bottom: 0;
    }

    .rateNumber{
      font-family: "Inter", sans-serif;
      font-size: clamp(3.8rem, 7vw, 5.2rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--ink);
      line-height: 1;
      white-space: nowrap;
    }

    .pct{
      font-size: .38em;
      font-weight: 900;
      margin-left: .10em;
      color: var(--ink);
      position: relative;
      top: -0.30em;
    }

    .pulseDot{
      width:10px;height:10px;border-radius:50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 0 0 rgba(22,163,74,.26);
      animation: pulse 1.7s ease-out infinite;
    }

    @keyframes pulse{
      0%{ box-shadow: 0 0 0 0 rgba(22,163,74,.28); transform: scale(1); }
      60%{ box-shadow: 0 0 0 14px rgba(22,163,74,0); transform: scale(1.04); }
      100%{ box-shadow: 0 0 0 0 rgba(22,163,74,0); transform: scale(1); }
    }

    /* ===== Main card ===== */
    .card{
      border:1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    .cardHeader{
      padding: 16px 20px;
      border-bottom:1px solid var(--line);
      text-align:center;
    }

    .cardHeader h2{
      margin:0;
      font-family: "Cinzel", serif;
      font-size: 1.45rem;
      letter-spacing:.06em;
      font-weight: 900;
      text-transform: uppercase;
      text-align:center;
    }

    /* ===== Image Buttons (Desktop = single row) ===== */
    .buttonRow{
      padding: 16px;
      display:flex;
      gap: 14px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: nowrap;
    }

    .imgBtn{
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 10px 22px rgba(2,6,23,.06);
      cursor:pointer;
      padding: 8px;
      flex: 0 0 auto;
      transition: transform .14s ease, box-shadow .14s ease, border-color .14s ease;
      user-select:none;
      outline: none;
    }

    .imgBtn:hover{
      transform: translateY(-2px) scale(1.05);
      border-color: rgba(22,163,74,.35);
      box-shadow: 0 18px 34px rgba(2,6,23,.10);
    }

    .imgBtn[aria-pressed="true"]{
      border-color: rgba(22,163,74,.60);
      box-shadow: 0 18px 34px rgba(22,163,74,.12);
      outline: 3px solid rgba(22,163,74,.18);
    }

    .imgBtn img{
      display:block;
      width: 140px;
      height: 140px;
      object-fit: contain;
      border-radius: 12px;
    }

    .fineprint{
      color:#64748b;
      font-size:.82rem;
      font-weight:600;
      padding: 0 4px 2px;
      text-align:center;
    }

    /* =========================================================
       MOBILE: tighten gap under fixed header
       ========================================================= */
    @media (max-width: 760px){
      :root{
        --mobileHeaderH: 150px;
        --mobileGap: 6px;
      }

      body{
        padding: 12px;
      }

      .mobileFixedHeader{
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 50;
        background: var(--bg);
        padding: 8px 12px 6px;
        box-shadow: 0 10px 28px rgba(2,6,23,.08);
      }

      .mobileContent{
        margin-top: calc(var(--mobileHeaderH) + var(--mobileGap));
      }

      .topBar{
        margin-top: 0;
        display:grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 8px;
        align-items:center;
      }

      .brand img{
        width: 104px;
      }

      .rateBlock{
        min-height: unset;
        padding: 0;
        text-align:center;
      }

      .rateKicker{
        font-size: .56rem;
        letter-spacing: .12em;
        margin-bottom: 3px;
        gap: 6px;
      }

      .pulseDot{ width:8px;height:8px; }

      .rateNumber{
        font-size: 1.58rem;
      }

      .pct{
        font-size: .42em;
        top: -0.16em;
      }

      .fullWidthBar{
        height: 12px;
        margin-top: 6px;
        margin-bottom: 0;
      }

      .cardHeader{
        padding: 10px 12px;
      }
      .cardHeader h2{
        font-size: 1.08rem;
      }

      /* Buttons: 2-column grid, equal sizes */
      .buttonRow{
        display:grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        padding: 12px;
        justify-content: unset;
        align-items: stretch;
        flex-wrap: unset;
      }

      .imgBtn{
        width: 100%;
        padding: 10px;
        border-radius: 16px;
        display:grid;
        place-items:center;
      }

      .imgBtn img{
        width: 100%;
        height: auto;
        aspect-ratio: 1 / 1;
        object-fit: contain;
        border-radius: 12px;
      }

      .imgBtn:active{
        transform: scale(0.98);
      }

      .fineprint{
        font-size: .78rem;
        padding-top: 2px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">

    <!-- MOBILE FIXED HEADER -->
    <div class="mobileFixedHeader">
      <section class="topBar">
        <div class="rateBlock">
          <div class="rateKicker">
            <span>Market Rate</span>
            <span class="pulseDot"></span>
          </div>
          <div class="rateValue">
            <div class="rateNumber">4.30<span class="pct">%</span></div>
          </div>
        </div>

        <div class="brand">
          <img
            src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Mascott.png"
            alt="Rate Thief mascot logo">
        </div>

        <div class="rateBlock">
          <div class="rateKicker">
            <span>APR as low as</span>
            <span class="pulseDot"></span>
          </div>
          <div class="rateValue">
            <div class="rateNumber">4.60<span class="pct">%</span></div>
          </div>
        </div>
      </section>

      <div class="fullWidthBar" aria-hidden="true"></div>
    </div>

    <!-- DESKTOP NORMAL HEADER (hidden on mobile via JS) -->
    <section class="topBar" aria-hidden="true">
      <div class="rateBlock">
        <div class="rateKicker">
          <span>Market Rate</span>
          <span class="pulseDot"></span>
        </div>
        <div class="rateValue">
          <div class="rateNumber">4.30<span class="pct">%</span></div>
        </div>
      </div>

      <div class="brand">
        <img
          src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Mascott.png"
          alt="Rate Thief mascot logo">
      </div>

      <div class="rateBlock">
        <div class="rateKicker">
          <span>APR as low as</span>
          <span class="pulseDot"></span>
        </div>
        <div class="rateValue">
          <div class="rateNumber">4.60<span class="pct">%</span></div>
        </div>
      </div>
    </section>

    <div class="fullWidthBar" aria-hidden="true"></div>

    <!-- CONTENT -->
    <div class="mobileContent">
      <section class="card">
        <header class="cardHeader">
          <h2>CHOOSE YOUR GOAL</h2>
        </header>

        <div class="buttonRow" role="group" aria-label="Choose your goal">

          <!-- 1) Purchase -->
          <button class="imgBtn" type="button" data-choice="Purchase" aria-pressed="false" title="Purchase">
            <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/purchaseButton.png" alt="Purchase">
          </button>

          <!-- 2) Refinance -->
          <button class="imgBtn" type="button" data-choice="Refinance" aria-pressed="false" title="Refinance">
            <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/refinanceButton.png" alt="Refinance">
          </button>

          <!-- 3) Pay Off Debts (NEW) -->
          <button class="imgBtn" type="button" data-choice="Pay Off Debts" aria-pressed="false" title="Pay Off Debts">
            <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/payOffDebts.png" alt="Pay Off Debts">
          </button>

          <!-- 4) Cash Out -->
          <button class="imgBtn" type="button" data-choice="Cash Out" aria-pressed="false" title="Cash Out">
            <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/cashOut.png" alt="Cash Out">
          </button>

          <!-- 5) HELOC -->
          <button class="imgBtn" type="button" data-choice="HELOC" aria-pressed="false" title="HELOC">
            <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/HELOCbutton.png" alt="HELOC">
          </button>

          <!-- 6) Reverse Mortgage -->
          <button class="imgBtn" type="button" data-choice="Reverse Mortgage" aria-pressed="false" title="Reverse Mortgage">
            <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/reverseMortgage.png" alt="Reverse Mortgage">
          </button>

        </div>
      </section>

      <div class="fineprint">
        Example rates shown for demonstration only. Final pricing depends on credit, equity, occupancy, and timing.
      </div>
    </div>
  </main>

  <script>
    const btns = Array.from(document.querySelectorAll(".imgBtn"));

    function setPressed(el){
      btns.forEach(b => b.setAttribute("aria-pressed","false"));
      el.setAttribute("aria-pressed","true");
    }

    btns.forEach(el => {
      el.addEventListener("click", () => setPressed(el));
      el.addEventListener("keydown", (e) => {
        if(e.key === "Enter" || e.key === " "){
          e.preventDefault();
          setPressed(el);
        }
      });
    });

    /* Only show fixed header on mobile; hide duplicate desktop header + bar on mobile */
    function syncHeaderVisibility(){
      const isMobile = window.matchMedia("(max-width: 760px)").matches;
      const fixed = document.querySelector(".mobileFixedHeader");
      const desktopTop = document.querySelector('section.topBar[aria-hidden="true"]');
      const desktopBar = desktopTop?.nextElementSibling;

      if(isMobile){
        fixed.style.display = "block";
        if(desktopTop) desktopTop.style.display = "none";
        if(desktopBar && desktopBar.classList.contains("fullWidthBar")) desktopBar.style.display = "none";
      }else{
        fixed.style.display = "none";
        if(desktopTop) desktopTop.style.display = "grid";
        if(desktopBar && desktopBar.classList.contains("fullWidthBar")) desktopBar.style.display = "block";
      }
    }

    syncHeaderVisibility();
    window.addEventListener("resize", syncHeaderVisibility);
  </script>
</body>
</html>
