<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rate Options</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32"
        href="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/favicon_io/favicon-32x32.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f8f7f3;
      --card:#ffffff;
      --ink:#0f172a;
      --muted:#475569;
      --line:#e5e7eb;
      --accent:#16a34a;
      --accent2:#2563eb;
      --shadow:0 14px 40px rgba(2,6,23,.08);
      --radius:18px;
      --maxw:980px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100svh;
      font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--ink);
      background:var(--bg);
      display:flex;
      justify-content:center;
      padding:22px;
    }

    .wrap{
      width:min(var(--maxw),100%);
      display:grid;
      gap:18px;
    }

    .topBar{
      display:grid;
      grid-template-columns:1.25fr auto 1.25fr;
      gap:22px;
      align-items:center;
      margin-top:6px;
    }

    .brand{
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .brand img{
      width:min(220px,60vw);
      height:auto;
      filter:drop-shadow(0 10px 22px rgba(2,6,23,.14));
    }

    /* GOLD GLINT TAGLINE */
    .tagline{
      text-align:center;
      font-family:"Cinzel",serif;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.05em;
      font-size:clamp(1.1rem,2.4vw,1.65rem);
      margin:6px 0 6px;
      position:relative;
      display:inline-block;
      width:100%;
      overflow:hidden;
    }

    .tagline span{
      background:linear-gradient(
        100deg,
        #7a5c00 0%,
        #b8860b 20%,
        #ffd700 35%,
        #fff2a6 45%,
        #ffd700 55%,
        #b8860b 75%,
        #7a5c00 100%
      );
      background-size:200% auto;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      animation:goldShimmer 6s linear infinite;
      position:relative;
      display:inline-block;
    }

    @keyframes goldShimmer{
      0%{background-position:0% center;}
      100%{background-position:200% center;}
    }

    .tagline span::after{
      content:"";
      position:absolute;
      top:0;
      left:-75%;
      width:50%;
      height:100%;
      background:linear-gradient(
        120deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,.6) 50%,
        rgba(255,255,255,0) 100%
      );
      transform:skewX(-25deg);
      animation:glint 4.5s ease-in-out infinite;
    }

    @keyframes glint{
      0%{ left:-75%; }
      60%{ left:125%; }
      100%{ left:125%; }
    }

    .fullWidthBar{
      height:16px;
      width:100%;
      margin-top:6px;
      margin-bottom:4px;
      background:linear-gradient(to bottom,#0b1220 0%,#0b1220 60%,#111827 100%);
      border-radius:999px;
      box-shadow:
        0 10px 22px rgba(0,0,0,.30),
        inset 0 2px 2px rgba(255,255,255,.08),
        inset 0 -3px 6px rgba(0,0,0,.45);
    }

    .rateBlock{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      min-height:130px;
    }

    .rateKicker{
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:center;
      color:var(--muted);
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.14em;
      font-size:.78rem;
      margin-bottom:10px;
    }

    .rateNumber{
      font-size:clamp(3.8rem,7vw,5.2rem);
      font-weight:900;
      line-height:1;
    }

    .pct{
      font-size:.38em;
      position:relative;
      top:-0.30em;
    }

    .pulseDot{
      width:10px;height:10px;border-radius:50%;
      background:linear-gradient(135deg,#16a34a,#2563eb);
      animation:pulse 1.7s ease-out infinite;
    }

    @keyframes pulse{
      0%{box-shadow:0 0 0 0 rgba(22,163,74,.28)}
      60%{box-shadow:0 0 0 14px rgba(22,163,74,0)}
      100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}
    }

    .card{
      border:1px solid var(--line);
      border-radius:18px;
      background:#ffffff;
      box-shadow:0 14px 40px rgba(2,6,23,.08);
      overflow:hidden;
    }

    .cardHeader{
      padding:16px 20px;
      border-bottom:1px solid var(--line);
      text-align:center;
    }

    .cardHeader h2{
      margin:0;
      font-family:"Cinzel",serif;
      font-size:1.45rem;
      letter-spacing:.06em;
      font-weight:900;
      text-transform:uppercase;
    }

    .buttonRow{
      padding:16px;
      display:flex;
      gap:14px;
      justify-content:space-between;
      align-items:center;
      flex-wrap:nowrap;
    }

    .imgBtn{
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      box-shadow:0 10px 22px rgba(2,6,23,.06);
      padding:8px;
      transition:.14s;
      display:inline-block;
    }

    .imgBtn:hover{
      transform:translateY(-2px) scale(1.05);
      border-color:rgba(22,163,74,.35);
      box-shadow:0 18px 34px rgba(2,6,23,.10);
    }

    .imgBtn img{
      width:140px;
      height:140px;
      object-fit:contain;
      border-radius:12px;
      display:block;
    }

    .fineprint{
      color:#64748b;
      font-size:.82rem;
      text-align:center;
    }
  </style>
</head>

<body>
  <main class="wrap">

    <section class="topBar">
      <div class="rateBlock">
        <div class="rateKicker">
          <span>Market Rate</span>
          <span class="pulseDot"></span>
        </div>
        <div class="rateNumber">4.30<span class="pct">%</span></div>
      </div>

      <div class="brand">
        <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Mascott.png"
             alt="Rate Thief mascot logo">
      </div>

      <div class="rateBlock">
        <div class="rateKicker">
          <span>APR as low as</span>
          <span class="pulseDot"></span>
        </div>
        <div class="rateNumber">4.60<span class="pct">%</span></div>
      </div>
    </section>

    <div class="tagline">
      <span>Rates so low it feels like stealing!</span>
    </div>

    <div class="fullWidthBar"></div>

    <section class="card">
      <header class="cardHeader">
        <h2>CHOOSE YOUR GOAL</h2>
      </header>

      <div class="buttonRow">

        <a class="imgBtn" target="_blank"
           href="https://docs.google.com/forms/d/e/1FAIpQLSfkCsj5cuTngElW-Nz7Ybi3zW_FT_xLdJ2jaKhEzYBFtd50wA/viewform?usp=header">
          <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/payOffDebts.png">
        </a>

        <a class="imgBtn" target="_blank"
           href="https://docs.google.com/forms/d/e/1FAIpQLSfkCsj5cuTngElW-Nz7Ybi3zW_FT_xLdJ2jaKhEzYBFtd50wA/viewform?usp=header">
          <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/cashOut.png">
        </a>

        <a class="imgBtn" target="_blank"
           href="https://docs.google.com/forms/d/e/1FAIpQLSfkCsj5cuTngElW-Nz7Ybi3zW_FT_xLdJ2jaKhEzYBFtd50wA/viewform?usp=header">
          <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/refinanceButton.png">
        </a>

        <a class="imgBtn" target="_blank"
           href="https://docs.google.com/forms/d/e/1FAIpQLSfkCsj5cuTngElW-Nz7Ybi3zW_FT_xLdJ2jaKhEzYBFtd50wA/viewform?usp=header">
          <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/HELOCbutton.png">
        </a>

        <a class="imgBtn" target="_blank"
           href="https://docs.google.com/forms/d/e/1FAIpQLSfkCsj5cuTngElW-Nz7Ybi3zW_FT_xLdJ2jaKhEzYBFtd50wA/viewform?usp=header">
          <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/purchaseButton.png">
        </a>

        <a class="imgBtn" target="_blank"
           href="https://docs.google.com/forms/d/e/1FAIpQLSfkCsj5cuTngElW-Nz7Ybi3zW_FT_xLdJ2jaKhEzYBFtd50wA/viewform?usp=header">
          <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/reverseMortgage.png">
        </a>

      </div>
    </section>

    <div class="fineprint">
      Example rates shown for demonstration only. Final pricing depends on credit, equity, occupancy, and timing.
    </div>

  </main>
</body>
</html>
