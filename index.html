<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rate Options</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32"
        href="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/favicon_io/favicon-32x32.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#ffffff;
      --card:#ffffff;
      --ink:#0f172a;
      --muted:#475569;
      --line:#e5e7eb;
      --accent:#16a34a;
      --accent2:#2563eb;
      --shadow:0 14px 40px rgba(2,6,23,.08);
      --radius:18px;
      --maxw:980px;

      --mobileHeaderH:0px;
      --mobileGap:10px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100svh;
      font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--ink);
      background:#f8f7f3;
      display:flex;
      justify-content:center;
      padding:18px;
    }

    .wrap{
      width:min(var(--maxw),100%);
      display:grid;
      gap:10px;
    }

    .topBar{
      display:grid;
      grid-template-columns:1.25fr auto 1.25fr;
      gap:18px;
      align-items:center;
      margin-top:2px;
    }

    .brand{
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .brand img{
      width:min(210px,58vw);
      height:auto;
      filter:drop-shadow(0 10px 22px rgba(2,6,23,.14));
    }

    /* TAGLINE */
    .tagline{
      text-align:center;
      font-family:"Cinzel",serif;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.05em;
      font-size:clamp(1.05rem,2vw,1.45rem);
      margin:0;
      padding:0 8px 2px;
      line-height:1.15;
      position:relative;
      overflow:hidden;
    }

    .tagline span{
      background:linear-gradient(
        100deg,
        #7a5c00 0%,
        #b8860b 20%,
        #ffd700 35%,
        #fff2a6 45%,
        #ffd700 55%,
        #b8860b 75%,
        #7a5c00 100%
      );
      background-size:200% auto;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      animation:goldShimmer 6s linear infinite;
      position:relative;
      display:inline-block;
    }

    @keyframes goldShimmer{
      0%{background-position:0% center;}
      100%{background-position:200% center;}
    }

    .tagline span::after{
      content:"";
      position:absolute;
      top:0;
      left:-75%;
      width:50%;
      height:100%;
      background:linear-gradient(
        120deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,.6) 50%,
        rgba(255,255,255,0) 100%
      );
      transform:skewX(-25deg);
      animation:glint 4.5s ease-in-out infinite;
      pointer-events:none;
    }

    @keyframes glint{
      0%{ left:-75%; }
      60%{ left:125%; }
      100%{ left:125%; }
    }

    /* GREEN HIGHLIGHTS */
    .highlight-rates{
      background:linear-gradient(180deg,#22c55e,#16a34a,#0f7a38);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      text-shadow:0 2px 6px rgba(22,163,74,.25);
    }

    .highlight-steal{
      background:linear-gradient(180deg,#15803d,#065f46,#064e3b);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      text-shadow:0 2px 6px rgba(6,95,70,.35);
    }

    .fullWidthBar{
      height:14px;
      width:100%;
      margin-top:4px;
      background:linear-gradient(to bottom,#0b1220 0%,#0b1220 60%,#111827 100%);
      border-radius:999px;
      box-shadow:0 10px 22px rgba(0,0,0,.30);
    }

    .rateBlock{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
    }

    .rateKicker{
      display:flex;
      gap:10px;
      justify-content:center;
      color:var(--muted);
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.14em;
      font-size:.78rem;
      margin-bottom:8px;
    }

    .rateNumber{
      font-size:clamp(3.4rem,6.6vw,5rem);
      font-weight:900;
      line-height:1;
    }

    .pct{
      font-size:.38em;
      position:relative;
      top:-0.30em;
    }

    .pulseDot{
      width:10px;height:10px;border-radius:50%;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      animation:pulse 1.7s ease-out infinite;
    }

    @keyframes pulse{
      0%{box-shadow:0 0 0 0 rgba(22,163,74,.28)}
      60%{box-shadow:0 0 0 14px rgba(22,163,74,0)}
      100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}
    }

    .card{
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:var(--card);
      box-shadow:var(--shadow);
    }

    .cardHeader{
      padding:12px 16px;
      border-bottom:1px solid var(--line);
      text-align:center;
    }

    .cardHeader h2{
      margin:0;
      font-family:"Cinzel",serif;
      font-size:1.30rem;
      font-weight:900;
      text-transform:uppercase;
    }

    .buttonRow{
      padding:14px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      justify-content:space-between;
    }

    .imgBtn{
      flex:1 1 calc((100% - 5*12px)/6);
      min-width:120px;
      max-width:160px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      padding:8px;
      cursor:pointer;
      transition:.14s;
    }

    .imgBtn img{
      width:100%;
      aspect-ratio:1/1;
      object-fit:contain;
      display:block;
    }

    .fineprint{
      color:#64748b;
      font-size:.82rem;
      text-align:center;
      margin-top:4px;
    }

    @media (max-width:760px){
      :root{
        --mobileHeaderH:190px;
        --mobileGap:6px;
      }

      body{padding:12px}

      .buttonRow{
        display:grid;
        grid-template-columns:repeat(2,1fr);
        gap:12px;
      }

      .imgBtn{
        min-width:unset;
        max-width:unset;
        flex:unset;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">

    <section class="topBar">
      <div class="rateBlock">
        <div class="rateKicker">
          <span>Market Rate</span>
          <span class="pulseDot"></span>
        </div>
        <div class="rateNumber">4.30<span class="pct">%</span></div>
      </div>

      <div class="brand">
        <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Mascott.png">
      </div>

      <div class="rateBlock">
        <div class="rateKicker">
          <span>APR as low as</span>
          <span class="pulseDot"></span>
        </div>
        <div class="rateNumber">4.60<span class="pct">%</span></div>
      </div>
    </section>

    <div class="tagline">
      <span>
        <span class="highlight-rates">Rates</span>
        so low it feels like
        <span class="highlight-steal">Stealing!</span>
      </span>
    </div>

    <div class="fullWidthBar"></div>

    <section class="card">
      <header class="cardHeader">
        <h2>CHOOSE YOUR GOAL</h2>
      </header>

      <div class="buttonRow">

        <button class="imgBtn" data-choice="Pay Off Debts">
          <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/payOffDebts.png">
        </button>

        <button class="imgBtn" data-choice="Cash Out">
          <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/cashOut.png">
        </button>

        <button class="imgBtn" data-choice="Lower Rate">
          <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/refinanceButton.png">
        </button>

        <button class="imgBtn" data-choice="HELOC">
          <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/HELOCbutton.png">
        </button>

        <button class="imgBtn" data-choice="Purchase">
          <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/purchaseButton.png">
        </button>

        <button class="imgBtn" data-choice="Reverse Mortgage">
          <img src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/reverseMortgage.png">
        </button>

      </div>
    </section>

    <div class="fineprint">
      Example rates shown for demonstration only. Final pricing depends on credit, equity, occupancy, and timing.
    </div>

  </main>

  <script>
    const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfkCsj5cuTngElW-Nz7Ybi3zW_FT_xLdJ2jaKhEzYBFtd50wA/viewform?usp=header";
    document.querySelectorAll(".imgBtn").forEach(btn=>{
      btn.addEventListener("click",()=>{
        const choice = btn.getAttribute("data-choice");
        const url = FORM_URL + "&choice=" + encodeURIComponent(choice);
        window.open(url,"_blank");
      });
    });
  </script>

</body>
</html>
