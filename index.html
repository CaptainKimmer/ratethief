<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Get a Rate!</title>

<link rel="icon" type="image/png" sizes="32x32"
href="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/favicon_io/favicon-32x32.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
--bg:#ffffff;
--card:#ffffff;
--ink:#0f172a;
--muted:#475569;
--line:#e5e7eb;
--shadow:0 14px 40px rgba(2,6,23,.08);
--radius:18px;
--maxw:980px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:"Inter",sans-serif;
background:#f8f7f3;
color:var(--ink);
display:flex;
justify-content:center;
padding:18px;
}

.wrap{
width:min(var(--maxw),100%);
display:grid;
gap:10px;
}

.card{
border:1px solid var(--line);
border-radius:var(--radius);
background:var(--card);
box-shadow:var(--shadow);
overflow:hidden;
}

.cardHeader{
padding:14px 16px;
border-bottom:1px solid var(--line);
text-align:center;
}

.cardHeader h2{
margin:0;
font-family:"Cinzel",serif;
font-size:1.85rem;
letter-spacing:.07em;
font-weight:900;
text-transform:uppercase;
}

.buttonRow{
padding:14px;
display:flex;
gap:12px;
justify-content:space-between;
flex-wrap:wrap;
}

.imgBtn{
border:1px solid var(--line);
border-radius:16px;
background:#fff;
padding:8px;
flex:1 1 140px;
max-width:160px;
text-decoration:none;
}

.imgBtn img{
width:100%;
aspect-ratio:1/1;
object-fit:contain;
border-radius:12px;
}

.adDisclosure{
text-align:center;
margin:12px 0;
font-size:.8rem;
}

.adDisclosure a{
color:#64748b;
font-weight:700;
text-decoration:underline;
}

footer.siteFooter{
margin-top:20px;
border-top:1px solid var(--line);
padding:16px;
font-size:.82rem;
text-align:center;
color:#64748b;
}

.footerLinks{
display:flex;
gap:14px;
justify-content:center;
flex-wrap:wrap;
margin-bottom:10px;
font-weight:700;
}

.footerLinks a{
color:#475569;
text-decoration:underline;
}

.footerMeta{
margin-top:10px;
font-size:.75rem;
color:#94a3b8;
}

/* MODAL */
.modalOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
z-index:999;
padding:18px;
}

.modalOverlay.open{display:flex;}

.modal{
background:#fff;
width:min(900px,100%);
border-radius:18px;
box-shadow:0 22px 60px rgba(0,0,0,.25);
overflow:hidden;
}

.modalHeader{
display:flex;
justify-content:space-between;
padding:16px;
border-bottom:1px solid var(--line);
}

.modalTitle{
font-family:"Cinzel",serif;
font-weight:900;
letter-spacing:.05em;
}

.modalClose{
cursor:pointer;
font-weight:900;
border:none;
background:none;
font-size:18px;
}

.modalBody{
padding:16px;
max-height:70vh;
overflow:auto;
}
</style>
</head>

<body>
<main class="wrap">

<section class="card">
<header class="cardHeader">
<h2>CHOOSE YOUR GOAL</h2>
</header>

<div class="buttonRow">
<a href="#" class="imgBtn"><img src="https://via.placeholder.com/300" /></a>
<a href="#" class="imgBtn"><img src="https://via.placeholder.com/300" /></a>
<a href="#" class="imgBtn"><img src="https://via.placeholder.com/300" /></a>
<a href="#" class="imgBtn"><img src="https://via.placeholder.com/300" /></a>
<a href="#" class="imgBtn"><img src="https://via.placeholder.com/300" /></a>
<a href="#" class="imgBtn"><img src="https://via.placeholder.com/300" /></a>
</div>
</section>

<div class="adDisclosure">
<a href="#" data-modal="advertising-disclosure.html">*Advertising Disclosure</a>
</div>

<footer class="siteFooter">
<div class="footerLinks">
<a href="#" data-modal="privacyPolicy.html">Privacy Policy</a>
<a href="#" data-modal="advertising-disclosure.html">Advertising Disclosure</a>
</div>

<div class="footerMeta">
© <span id="footerYear"></span> RateThief.com. All rights reserved.
</div>
</footer>

</main>

<!-- MODAL -->
<div class="modalOverlay" id="modal">
<div class="modal">
<div class="modalHeader">
<div class="modalTitle" id="modalTitle">Loading...</div>
<button class="modalClose" id="modalClose">✕</button>
</div>
<div class="modalBody" id="modalBody"></div>
</div>
</div>

<script>
document.getElementById("footerYear").textContent = new Date().getFullYear();

const modal = document.getElementById("modal");
const modalBody = document.getElementById("modalBody");
const modalTitle = document.getElementById("modalTitle");

document.addEventListener("click", async (e) => {
const link = e.target.closest("[data-modal]");
if(!link) return;

e.preventDefault();
const file = link.getAttribute("data-modal");

modal.classList.add("open");
modalTitle.textContent = "Loading...";

try{
const res = await fetch(file);
const html = await res.text();
modalBody.innerHTML = html;
modalTitle.textContent = file.replace(".html","").replace(/([A-Z])/g," $1").trim();
}catch{
modalBody.innerHTML = "<p>Unable to load file.</p>";
}
});

document.getElementById("modalClose").onclick = () => modal.classList.remove("open");
modal.onclick = e => { if(e.target === modal) modal.classList.remove("open"); };
</script>

</body>
</html>
