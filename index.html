<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rate Options</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32"
        href="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/favicon_io/favicon-32x32.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: #ffffff;
      --ink: #0b1220;
      --muted: #6b7280;
      --card: #ffffff;
      --stroke: #e5e7eb;
      --shadow: 0 18px 40px rgba(11,18,32,.10);
      --pillShadow: 0 12px 24px rgba(11,18,32,.22);
      --accent: #18c39c;
      --navy: #0c1426;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Layout */
    .page{
      max-width: 1120px;
      margin: 0 auto;
      padding: 26px 18px 40px;
    }

    .topRow{
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 18px;
      margin-top: 4px;
    }

    /* Rate tiles */
    .rateTile{
      text-align: center;
    }
    .rateLabel{
      display: inline-flex;
      align-items: center;
      gap: 10px;
      letter-spacing: .14em;
      text-transform: uppercase;
      font-weight: 800;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .dot{
      width: 12px; height: 12px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(24,195,156,.15);
    }
    .rateValue{
      font-size: clamp(44px, 5vw, 74px);
      font-weight: 900;
      color: #0a1222;
      line-height: 1;
      letter-spacing: -0.04em;
    }
    .rateValue span{
      font-size: .45em;
      font-weight: 900;
      margin-left: 4px;
      opacity: .9;
    }
    .rateSub{
      margin-top: 10px;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #4b5563;
    }

    /* Center logo */
    .logoWrap{
      display: grid;
      place-items: center;
      gap: 12px;
    }
    .logo{
      width: 130px;
      height: auto;
      display: block;
    }
    .pillShadow{
      width: 240px;
      height: 14px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(12,20,38,.95), rgba(12,20,38,.55));
      box-shadow: var(--pillShadow);
    }

    /* Card */
    .card{
      margin: 22px auto 0;
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .cardHeader{
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--stroke);
      text-align: center;
    }
    .cardHeader h2{
      margin: 0;
      font-family: Cinzel, serif;
      font-weight: 900;
      letter-spacing: .12em;
      font-size: 20px;
      color: #0b1220;
    }

    /* NEW: Square image buttons (one horizontal line) */
    .goalStrip{
      padding: 18px;
    }

    .goalButtons{
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      flex-wrap: nowrap; /* one line on desktop */
    }

    .goalBtn{
      display: inline-block;
      width: 150px;              /* adjust if you want bigger/smaller */
      aspect-ratio: 1 / 1;       /* perfect square */
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--stroke);
      background: #fff;
      box-shadow: 0 10px 22px rgba(11,18,32,.10);
      transform: translateZ(0);
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
      cursor: pointer;
      user-select: none;
    }

    .goalBtn img{
      width: 100%;
      height: 100%;
      object-fit: cover; /* no warping */
      display: block;
    }

    .goalBtn:hover{
      transform: scale(1.06);
      box-shadow: 0 16px 34px rgba(11,18,32,.18);
      border-color: rgba(24,195,156,.55);
    }

    .goalBtn:active{
      transform: scale(1.02);
    }

    .goalBtn.isSelected{
      border-color: rgba(24,195,156,.85);
      box-shadow: 0 18px 40px rgba(24,195,156,.22);
      transform: scale(1.03);
    }

    /* Footer note */
    .note{
      margin-top: 14px;
      text-align: center;
      color: #64748b;
      font-size: 12px;
      font-weight: 600;
    }

    /* Responsive */
    @media (max-width: 980px){
      .topRow{
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .pillShadow{
        width: 180px;
      }

      /* allow wrap on small screens so it doesn't overflow */
      .goalButtons{
        flex-wrap: wrap;
      }
      .goalBtn{
        width: min(160px, 42vw);
      }
    }

    @media (max-width: 460px){
      .goalBtn{
        width: 44vw;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <!-- TOP: rates + logo -->
    <section class="topRow">
      <div class="rateTile">
        <div class="rateLabel">
          TODAY'S SNAPSHOT <span class="dot" aria-hidden="true"></span>
        </div>
        <div class="rateValue" id="rateSnapshot">4.30<span>%</span></div>
        <div class="rateSub">FIXED-RATE EXAMPLE</div>
      </div>

      <div class="logoWrap">
        <img class="logo" alt="Rate Thief Logo"
             src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/RateThiefLogo.png"
             onerror="this.onerror=null;this.src='https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Logo/ratethiefLogo.png';">
        <div class="pillShadow" aria-hidden="true"></div>
      </div>

      <div class="rateTile">
        <div class="rateLabel">
          FIXED-RATE OPTIONS <span class="dot" aria-hidden="true"></span>
        </div>
        <div class="rateValue" id="rateOptions">4.60<span>%</span></div>
        <div class="rateSub">APR EXAMPLE</div>
      </div>
    </section>

    <!-- GOALS CARD -->
    <section class="card" aria-label="Choose your goal">
      <div class="cardHeader">
        <h2>CHOOSE YOUR GOAL</h2>
      </div>

      <div class="goalStrip">
        <div class="goalButtons">
          <!-- 1) PURCHASE -->
          <a class="goalBtn" href="#"
             data-goal="purchase"
             aria-label="Purchase">
            <img
              src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/purchaseButton.png"
              alt="Purchase">
          </a>

          <!-- 2) REFINANCE -->
          <a class="goalBtn" href="#"
             data-goal="refinance"
             aria-label="Refinance">
            <img
              src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/refinanceButton.png"
              alt="Refinance">
          </a>

          <!-- 3) CASH OUT -->
          <a class="goalBtn" href="#"
             data-goal="cashout"
             aria-label="Cash Out">
            <img
              src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/cashOut.png"
              alt="Cash Out">
          </a>

          <!-- 4) HELOC -->
          <a class="goalBtn" href="#"
             data-goal="heloc"
             aria-label="HELOC">
            <img
              src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/HELOCbutton.png"
              alt="HELOC">
          </a>

          <!-- 5) REVERSE MORTGAGE -->
          <a class="goalBtn" href="#"
             data-goal="reverse"
             aria-label="Reverse Mortgage">
            <img
              src="https://raw.githubusercontent.com/CaptainKimmer/ratethief/refs/heads/main/RateThiefAssets/Images/Quiz/Q1%20Buttons/reverseMortgage.png"
              alt="Reverse Mortgage">
          </a>
        </div>

        <div class="note">
          Example rates shown for demonstration only. Final pricing depends on credit, equity, occupancy, and timing.
        </div>
      </div>
    </section>

  </main>

  <script>
    // Click behavior: select a goal (adds a highlight), and you can route to your quiz step.
    const goalButtons = document.querySelectorAll('.goalBtn');

    function setSelected(btn) {
      goalButtons.forEach(b => b.classList.remove('isSelected'));
      btn.classList.add('isSelected');
    }

    goalButtons.forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();

        setSelected(btn);

        const goal = btn.getAttribute('data-goal');
        // TODO: replace with your real navigation / state update
        // Example:
        // window.location.href = `/quiz.html?goal=${encodeURIComponent(goal)}`;
        console.log('Selected goal:', goal);
      });
    });
  </script>
</body>
</html>
